<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .8; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Lucide React icons as simple SVG components
        const ChevronRight = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );

        const Calendar = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const TrendingUp = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const Plus = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const Check = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        const X = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const WorkoutTracker = () => {
            // Workout definitions with current weights
            const workouts = {
                A: [
                    { name: 'Flat Bench Press', weight: 80, targetReps: '6-8', rest: '3-4 min' },
                    { name: 'Leg Press', weight: 190, targetReps: '12-15', rest: '2-3 min' },
                    { name: 'Seated Cable Row', weight: 85, targetReps: '8-10', rest: '2-3 min' },
                    { name: 'Lateral DB Raise', weight: 14, targetReps: '12-15', rest: '1.5-2 min' },
                    { name: 'Incline DB Curl', weight: 16, targetReps: '8-10', rest: '1.5-2 min' },
                    { name: 'Rope Pushdown', weight: 35, targetReps: '8-10', rest: '1.5-2 min' }
                ],
                B: [
                    { name: 'Deadlift', weight: 107.5, targetReps: '5-7', rest: '3-4 min', notes: 'Form priority' },
                    { name: 'Seated DB Press', weight: 28, targetReps: '8-10', rest: '2-3 min' },
                    { name: 'Lat Pulldown', weight: 85, targetReps: '8-10', rest: '2-3 min', notes: 'Use straps + wider grip' },
                    { name: 'Hammer Curl', weight: 18, targetReps: '8-10', rest: '1.5-2 min' },
                    { name: 'Leg Extension', weight: 82, targetReps: '12-15', rest: '2 min' },
                    { name: 'Barbell Curl', weight: 37.5, targetReps: '8-10', rest: '1.5-2 min' }
                ],
                C: [
                    { name: 'Incline DB Bench', weight: 30, targetReps: '8-10', rest: '2-3 min' },
                    { name: 'Single Arm Cable Row', weight: 36, targetReps: '8-10', rest: '2-3 min', notes: 'Try straps' },
                    { name: 'Weighted Crunch', weight: 32.5, targetReps: '12-15', rest: '1.5-2 min' },
                    { name: 'Cable Face Pull', weight: 36.25, targetReps: '12-15', rest: '1.5-2 min' },
                    { name: 'Overhead Tricep Extension', weight: 30, targetReps: '8-10', rest: '1.5-2 min' },
                    { name: 'Hanging Knee Raise', weight: 0, targetReps: '15-20', rest: '1.5-2 min' }
                ]
            };

            // Initial seed data from recent workouts
            const initialHistory = [
                // Session A - March 11 (Tuesday)
                { date: '2025-03-11T10:00:00Z', session: 'A', exercise: 'Flat Bench Press', sets: [{ reps: 6, weight: 80 }, { reps: 6, weight: 80 }, { reps: 6, weight: 80 }] },
                { date: '2025-03-11T10:15:00Z', session: 'A', exercise: 'Leg Press', sets: [{ reps: 12, weight: 190 }, { reps: 12, weight: 190 }, { reps: 12, weight: 190 }] },
                { date: '2025-03-11T10:30:00Z', session: 'A', exercise: 'Seated Cable Row', sets: [{ reps: 10, weight: 82 }, { reps: 10, weight: 82 }, { reps: 10, weight: 82 }] },
                { date: '2025-03-11T10:45:00Z', session: 'A', exercise: 'Lateral DB Raise', sets: [{ reps: 14, weight: 14 }, { reps: 14, weight: 14 }, { reps: 14, weight: 14 }] },
                { date: '2025-03-11T10:55:00Z', session: 'A', exercise: 'Rope Pushdown', sets: [{ reps: 10, weight: 32.5 }, { reps: 10, weight: 32.5 }, { reps: 10, weight: 32.5 }] },
                { date: '2025-03-11T11:05:00Z', session: 'A', exercise: 'Incline DB Curl', sets: [{ reps: 10, weight: 14 }, { reps: 10, weight: 14 }, { reps: 10, weight: 14 }] },
                
                // Session B - March 8 (Saturday)
                { date: '2025-03-08T14:00:00Z', session: 'B', exercise: 'Deadlift', sets: [{ reps: 6, weight: 107.5 }, { reps: 6, weight: 107.5 }, { reps: 6, weight: 107.5 }] },
                { date: '2025-03-08T14:20:00Z', session: 'B', exercise: 'Seated DB Press', sets: [{ reps: 10, weight: 26 }, { reps: 10, weight: 26 }, { reps: 10, weight: 26 }] },
                { date: '2025-03-08T14:35:00Z', session: 'B', exercise: 'Lat Pulldown', sets: [{ reps: 10, weight: 82 }, { reps: 10, weight: 82 }, { reps: 9, weight: 82 }] },
                { date: '2025-03-08T14:50:00Z', session: 'B', exercise: 'Hammer Curl', sets: [{ reps: 8, weight: 18 }, { reps: 8, weight: 18 }, { reps: 8, weight: 18 }] },
                { date: '2025-03-08T15:00:00Z', session: 'B', exercise: 'Leg Extension', sets: [{ reps: 15, weight: 82 }, { reps: 15, weight: 82 }, { reps: 13, weight: 82 }] },
                { date: '2025-03-08T15:10:00Z', session: 'B', exercise: 'Barbell Curl', sets: [{ reps: 10, weight: 35 }, { reps: 10, weight: 35 }, { reps: 10, weight: 35 }] },
                
                // Session C - March 9 (Sunday)
                { date: '2025-03-09T10:00:00Z', session: 'C', exercise: 'Incline DB Bench', sets: [{ reps: 8, weight: 30 }, { reps: 8, weight: 30 }, { reps: 8, weight: 30 }] },
                { date: '2025-03-09T10:15:00Z', session: 'C', exercise: 'Single Arm Cable Row', sets: [{ reps: 8, weight: 36 }, { reps: 8, weight: 36 }, { reps: 8, weight: 36 }] },
                { date: '2025-03-09T10:30:00Z', session: 'C', exercise: 'Weighted Crunch', sets: [{ reps: 15, weight: 30 }, { reps: 15, weight: 30 }, { reps: 15, weight: 30 }] },
                { date: '2025-03-09T10:40:00Z', session: 'C', exercise: 'Cable Face Pull', sets: [{ reps: 13, weight: 36.25 }, { reps: 13, weight: 36.25 }, { reps: 13, weight: 36.25 }] },
                { date: '2025-03-09T10:50:00Z', session: 'C', exercise: 'Overhead Tricep Extension', sets: [{ reps: 10, weight: 26.25 }, { reps: 10, weight: 26.25 }, { reps: 10, weight: 26.25 }] },
                { date: '2025-03-09T11:00:00Z', session: 'C', exercise: 'Hanging Knee Raise', sets: [{ reps: 18, weight: 0 }, { reps: 18, weight: 0 }, { reps: 18, weight: 0 }] },
            ];

            const [selectedSession, setSelectedSession] = useState(null);
            const [activeExercise, setActiveExercise] = useState(null);
            const [currentWeight, setCurrentWeight] = useState(null);
            const [repInput, setRepInput] = useState('');
            const [currentSets, setCurrentSets] = useState([]);
            const [sessionHistory, setSessionHistory] = useState([]);
            const [view, setView] = useState('select');

            // Load history from localStorage or use initial seed data
            useEffect(() => {
                const saved = localStorage.getItem('workoutHistory');
                if (saved) {
                    setSessionHistory(JSON.parse(saved));
                } else {
                    setSessionHistory(initialHistory);
                    localStorage.setItem('workoutHistory', JSON.stringify(initialHistory));
                }
            }, []);

            // Save history to localStorage
            useEffect(() => {
                if (sessionHistory.length > 0) {
                    localStorage.setItem('workoutHistory', JSON.stringify(sessionHistory));
                }
            }, [sessionHistory]);

            const startSession = (session) => {
                setSelectedSession(session);
                setView('workout');
            };

            const startExercise = (exercise) => {
                setActiveExercise(exercise);
                setCurrentWeight(exercise.weight);
                setCurrentSets([]);
                setRepInput('');
            };

            const checkForPRs = (exerciseName, newSet) => {
                const history = sessionHistory.filter(entry => entry.exercise === exerciseName);
                const prs = [];
                
                const maxWeight = Math.max(...history.flatMap(h => h.sets.map(s => s.weight)), 0);
                if (newSet.weight > maxWeight) {
                    prs.push({ type: 'weight', icon: '⭐', message: 'Weight PR!' });
                }
                
                const setsAtThisWeight = history.flatMap(h => h.sets.filter(s => s.weight === newSet.weight));
                const maxRepsAtWeight = Math.max(...setsAtThisWeight.map(s => s.reps), 0);
                if (newSet.reps > maxRepsAtWeight) {
                    prs.push({ type: 'reps', icon: '🔥', message: 'Rep PR at this weight!' });
                }
                
                const maxVolume = Math.max(...history.flatMap(h => h.sets.map(s => s.weight * s.reps)), 0);
                const currentVolume = newSet.weight * newSet.reps;
                if (currentVolume > maxVolume) {
                    prs.push({ type: 'volume', icon: '💪', message: 'Volume PR!' });
                }
                
                return prs;
            };

            const addSet = (reps) => {
                if (reps && reps > 0) {
                    const newSet = { reps: parseInt(reps), weight: currentWeight };
                    const prs = checkForPRs(activeExercise.name, newSet);
                    const setWithPRs = { ...newSet, prs };
                    setCurrentSets([...currentSets, setWithPRs]);
                    setRepInput('');
                }
            };

            const removeLastSet = () => {
                setCurrentSets(currentSets.slice(0, -1));
            };

            const completeExercise = () => {
                const newEntry = {
                    date: new Date().toISOString(),
                    session: selectedSession,
                    exercise: activeExercise.name,
                    sets: currentSets
                };
                setSessionHistory([newEntry, ...sessionHistory]);
                setActiveExercise(null);
                setCurrentSets([]);
                setCurrentWeight(null);
                setRepInput('');
            };

            const getExerciseHistory = (exerciseName) => {
                return sessionHistory
                    .filter(entry => entry.exercise === exerciseName)
                    .slice(0, 5);
            };

            const getProgressionStatus = (exercise, sets) => {
                if (sets.length < 3) return null;
                
                const [min, max] = exercise.targetReps.split('-').map(Number);
                const allMaxed = sets.every(set => set.reps >= max);
                const allMin = sets.every(set => set.reps >= min);
                
                if (allMaxed) return { status: 'increase', message: '✓ MAXED - Increase weight next time!' };
                if (allMin) return { status: 'good', message: '✓ Good progress' };
                return { status: 'maintain', message: 'Push for higher reps' };
            };

            // Session Selection View
            if (view === 'select') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-4">
                        <div className="max-w-md mx-auto pt-8">
                            <div className="text-center mb-8">
                                <h1 className="text-4xl font-bold text-white mb-2">Workout Tracker</h1>
                                <p className="text-slate-400">Select your session</p>
                            </div>

                            <div className="space-y-4 mb-6">
                                {['A', 'B', 'C'].map(session => (
                                    <button
                                        key={session}
                                        onClick={() => startSession(session)}
                                        className="w-full bg-slate-800 hover:bg-slate-700 text-white p-6 rounded-2xl shadow-xl transition-all transform hover:scale-105 active:scale-95"
                                    >
                                        <div className="flex items-center justify-between">
                                            <div className="text-left">
                                                <div className="text-3xl font-bold mb-1">Session {session}</div>
                                                <div className="text-slate-400 text-sm">
                                                    {workouts[session].length} exercises • {workouts[session].length * 3} sets
                                                </div>
                                            </div>
                                            <ChevronRight className="text-slate-400" size={32} />
                                        </div>
                                    </button>
                                ))}
                            </div>

                            <button
                                onClick={() => setView('history')}
                                className="w-full bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-xl flex items-center justify-center gap-2 transition-colors"
                            >
                                <TrendingUp size={20} />
                                View History
                            </button>
                        </div>
                    </div>
                );
            }

            // Workout View
            if (view === 'workout' && selectedSession) {
                if (activeExercise) {
                    const history = getExerciseHistory(activeExercise.name);
                    const progression = currentSets.length === 3 ? getProgressionStatus(activeExercise, currentSets) : null;

                    return (
                        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-4">
                            <div className="max-w-md mx-auto pt-4">
                                <button
                                    onClick={() => {
                                        setActiveExercise(null);
                                        setCurrentWeight(null);
                                        setRepInput('');
                                    }}
                                    className="text-slate-400 hover:text-white mb-4 flex items-center gap-2"
                                >
                                    ← Back to exercises
                                </button>

                                <div className="bg-slate-800 rounded-2xl p-6 mb-6 shadow-xl">
                                    <h2 className="text-2xl font-bold text-white mb-4">{activeExercise.name}</h2>
                                    
                                    <div className="mb-4">
                                        <div className="text-slate-400 text-sm mb-2">Weight (kg)</div>
                                        <input
                                            type="number"
                                            inputMode="decimal"
                                            value={currentWeight}
                                            onChange={(e) => setCurrentWeight(Math.max(0, parseFloat(e.target.value) || 0))}
                                            className="w-full bg-slate-700 text-white text-2xl font-bold p-4 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        {currentWeight !== activeExercise.weight && (
                                            <div className="text-yellow-400 text-xs mt-2 text-center">
                                                Modified from {activeExercise.weight}kg
                                            </div>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 text-sm">
                                        <div>
                                            <span className="text-slate-400">Target:</span>
                                            <span className="text-white font-bold ml-2">{activeExercise.targetReps} reps</span>
                                        </div>
                                        <div>
                                            <span className="text-slate-400">Rest:</span>
                                            <span className="text-white font-bold ml-2">{activeExercise.rest}</span>
                                        </div>
                                    </div>
                                    {activeExercise.notes && (
                                        <div className="mt-4 bg-blue-900/30 border border-blue-700 rounded-lg p-3">
                                            <span className="text-blue-300 text-sm">💡 {activeExercise.notes}</span>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-slate-800 rounded-2xl p-6 mb-6">
                                    <h3 className="text-white font-bold mb-4">Current Sets ({currentSets.length}/3)</h3>
                                    {currentSets.length === 0 ? (
                                        <p className="text-slate-400 text-center py-4 text-sm">No sets logged yet</p>
                                    ) : (
                                        <div className="space-y-2 mb-4">
                                            {currentSets.map((set, idx) => (
                                                <div key={idx}>
                                                    <div className="flex items-center justify-between bg-slate-700 p-3 rounded-lg">
                                                        <span className="text-white">Set {idx + 1}</span>
                                                        <span className="text-white font-bold">{set.weight}kg × {set.reps} reps</span>
                                                    </div>
                                                    {set.prs && set.prs.length > 0 && (
                                                        <div className="flex gap-2 mt-2 flex-wrap">
                                                            {set.prs.map((pr, prIdx) => (
                                                                <div key={prIdx} className="bg-gradient-to-r from-yellow-600 to-orange-600 text-white px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 animate-pulse">
                                                                    <span>{pr.icon}</span>
                                                                    <span>{pr.message}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {currentSets.length > 0 && currentSets.length < 3 && (
                                        <button
                                            onClick={removeLastSet}
                                            className="w-full bg-red-600 hover:bg-red-700 text-white p-3 rounded-lg mb-4 flex items-center justify-center gap-2"
                                        >
                                            <X size={20} />
                                            Remove Last Set
                                        </button>
                                    )}

                                    {progression && (
                                        <div className={`p-4 rounded-lg mb-4 ${
                                            progression.status === 'increase' ? 'bg-green-900/30 border border-green-700' :
                                            progression.status === 'good' ? 'bg-blue-900/30 border border-blue-700' :
                                            'bg-yellow-900/30 border border-yellow-700'
                                        }`}>
                                            <p className={`font-bold ${
                                                progression.status === 'increase' ? 'text-green-300' :
                                                progression.status === 'good' ? 'text-blue-300' :
                                                'text-yellow-300'
                                            }`}>
                                                {progression.message}
                                            </p>
                                        </div>
                                    )}

                                    {currentSets.length < 3 && (
                                        <>
                                            <div className="mb-3">
                                                <div className="text-slate-400 text-sm mb-2">Reps for Set {currentSets.length + 1}</div>
                                                <input
                                                    type="number"
                                                    inputMode="numeric"
                                                    value={repInput}
                                                    onChange={(e) => setRepInput(e.target.value)}
                                                    onKeyPress={(e) => {
                                                        if (e.key === 'Enter') {
                                                            addSet(repInput);
                                                        }
                                                    }}
                                                    placeholder="Enter reps"
                                                    className="w-full bg-slate-700 text-white text-3xl font-bold p-5 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                    autoFocus
                                                />
                                            </div>

                                            <button
                                                onClick={() => addSet(repInput)}
                                                disabled={!repInput || repInput <= 0}
                                                className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-600 disabled:cursor-not-allowed text-white p-4 rounded-lg font-bold flex items-center justify-center gap-2"
                                            >
                                                <Plus size={20} />
                                                Log Set
                                            </button>
                                        </>
                                    )}

                                    {currentSets.length === 3 && (
                                        <button
                                            onClick={completeExercise}
                                            className="w-full bg-green-600 hover:bg-green-700 text-white p-4 rounded-lg flex items-center justify-center gap-2 font-bold"
                                        >
                                            <Check size={24} />
                                            Complete Exercise
                                        </button>
                                    )}
                                </div>

                                {history.length > 0 && (
                                    <div className="bg-slate-800 rounded-2xl p-6">
                                        <h3 className="text-white font-bold mb-4">Recent History</h3>
                                        <div className="space-y-3">
                                            {history.map((entry, idx) => (
                                                <div key={idx} className="bg-slate-700 p-3 rounded-lg">
                                                    <div className="text-slate-400 text-xs mb-2">
                                                        {new Date(entry.date).toLocaleDateString()}
                                                    </div>
                                                    <div className="text-white text-sm">
                                                        {entry.sets.map(s => `${s.reps}`).join('-')} reps @ {entry.sets[0].weight}kg
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-4">
                        <div className="max-w-md mx-auto pt-4">
                            <button
                                onClick={() => {
                                    setSelectedSession(null);
                                    setView('select');
                                }}
                                className="text-slate-400 hover:text-white mb-4 flex items-center gap-2"
                            >
                                ← Back to session select
                            </button>

                            <h2 className="text-3xl font-bold text-white mb-6">Session {selectedSession}</h2>

                            <div className="space-y-3">
                                {workouts[selectedSession].map((exercise, idx) => {
                                    const recent = getExerciseHistory(exercise.name)[0];
                                    const history = sessionHistory.filter(entry => entry.exercise === exercise.name);
                                    
                                    const maxWeight = history.length > 0 ? Math.max(...history.flatMap(h => h.sets.map(s => s.weight))) : 0;
                                    
                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => startExercise(exercise)}
                                            className="w-full bg-slate-800 hover:bg-slate-700 p-4 rounded-xl transition-colors text-left"
                                        >
                                            <div className="flex items-center justify-between">
                                                <div className="flex-1">
                                                    <div className="text-white font-bold mb-1">{exercise.name}</div>
                                                    <div className="text-slate-400 text-sm">
                                                        {exercise.weight > 0 ? `${exercise.weight}kg` : 'Bodyweight'} × {exercise.targetReps} reps × 3 sets
                                                    </div>
                                                    {recent && (
                                                        <div className="text-blue-400 text-xs mt-1">
                                                            Last: {recent.sets.map(s => s.reps).join('-')} @ {recent.sets[0].weight}kg
                                                        </div>
                                                    )}
                                                    {maxWeight > 0 && (
                                                        <div className="text-yellow-400 text-xs mt-1">
                                                            ⭐ PR: {maxWeight}kg
                                                        </div>
                                                    )}
                                                </div>
                                                <ChevronRight className="text-slate-500" size={24} />
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            // History View
            if (view === 'history') {
                const groupedHistory = sessionHistory.reduce((acc, entry) => {
                    const date = new Date(entry.date).toLocaleDateString();
                    if (!acc[date]) acc[date] = [];
                    acc[date].push(entry);
                    return acc;
                }, {});

                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-4">
                        <div className="max-w-md mx-auto pt-4">
                            <button
                                onClick={() => setView('select')}
                                className="text-slate-400 hover:text-white mb-4 flex items-center gap-2"
                            >
                                ← Back
                            </button>

                            <h2 className="text-3xl font-bold text-white mb-6">History</h2>

                            {Object.keys(groupedHistory).length === 0 ? (
                                <div className="bg-slate-800 rounded-xl p-8 text-center">
                                    <p className="text-slate-400">No workout history yet. Start tracking!</p>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {Object.entries(groupedHistory).map(([date, entries]) => (
                                        <div key={date} className="bg-slate-800 rounded-xl p-4">
                                            <div className="text-slate-400 text-sm mb-3 flex items-center gap-2">
                                                <Calendar size={16} />
                                                {date}
                                            </div>
                                            <div className="space-y-2">
                                                {entries.map((entry, idx) => (
                                                    <div key={idx} className="bg-slate-700 p-3 rounded-lg">
                                                        <div className="text-white font-bold text-sm mb-1">
                                                            Session {entry.session}: {entry.exercise}
                                                        </div>
                                                        <div className="text-slate-300 text-sm">
                                                            {entry.sets.map(s => `${s.reps}`).join('-')} reps @ {entry.sets[0].weight}kg
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WorkoutTracker />);
    </script>
</body>
</html>
