<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workout Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #000000;
      --slate-950:  #020617;
      --slate-900:  #0f172a;
      --slate-800:  #1e293b;
      --slate-700:  #334155;
      --slate-600:  #475569;
      --slate-500:  #64748b;
      --slate-400:  #94a3b8;
      --slate-300:  #cbd5e1;
      --white:      #ffffff;
      --cyan-400:   #22d3ee;
      --cyan-600:   #0891b2;
      --cyan-700:   #0e7490;
      --green-400:  #4ade80;
      --green-600:  #16a34a;
      --green-700:  #15803d;
      --green-950:  #052e16;
      --blue-300:   #93c5fd;
      --blue-400:   #60a5fa;
      --blue-600:   #2563eb;
      --blue-700:   #1d4ed8;
      --blue-800:   #1e40af;
      --blue-900:   #1e3a8a;
      --blue-950:   #172554;
      --red-400:    #f87171;
      --red-500:    #ef4444;
      --red-600:    #dc2626;
      --red-800:    #991b1b;
      --red-900:    #7f1d1d;
      --red-950:    #450a0a;
      --yellow-400: #facc15;
      --yellow-600: #ca8a04;
      --yellow-900: #713f12;
      --yellow-950: #422006;
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    #app { min-height: 100vh; }

    /* ── Layout ── */
    .screen        { min-height: 100vh; padding: 12px; background: var(--black); }
    .container     { max-width: 448px; margin: 0 auto; padding-top: 8px; }
    .container--home { padding-top: 24px; }

    /* ── Typography ── */
    .title-xl  { font-size: 1.5rem; font-weight: 700; color: var(--white); }
    .title-lg  { font-size: 1.125rem; font-weight: 600; color: var(--white); }
    .title-sm  { font-size: 0.875rem; font-weight: 600; color: var(--white); }
    .label     { font-size: 0.75rem; color: var(--slate-600); }
    .text-xs   { font-size: 0.75rem; }
    .text-sm   { font-size: 0.875rem; }
    .text-cyan { color: var(--cyan-400); }
    .text-muted { color: var(--slate-500); }

    /* ── Cards ── */
    .card {
      background: var(--slate-950);
      border: 1px solid var(--slate-900);
      border-radius: 8px;
      padding: 12px;
    }
    .card--inner {
      background: var(--slate-900);
      border-radius: 6px;
      padding: 8px;
    }

    /* ── Buttons ── */
    button { cursor: pointer; border: none; font-family: inherit; transition: background 0.15s, border-color 0.15s, color 0.15s; }

    .btn-back {
      background: none;
      color: var(--slate-600);
      font-size: 0.75rem;
      padding: 0;
      margin-bottom: 12px;
      display: block;
    }
    .btn-back:hover { color: var(--cyan-400); }

    .btn-primary {
      width: 100%;
      background: var(--green-700);
      color: var(--white);
      padding: 12px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover { background: var(--green-600); }

    .btn-secondary {
      width: 100%;
      background: var(--slate-900);
      border: 1px solid var(--slate-800);
      color: var(--slate-400);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
    }
    .btn-secondary:hover { background: var(--slate-800); }

    .btn-danger {
      width: 100%;
      background: var(--red-950);
      border: 1px solid var(--red-900);
      color: var(--red-400);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-danger:hover { background: var(--red-900); }

    .btn-log {
      width: 100%;
      background: var(--slate-900);
      border: 1px solid var(--slate-800);
      color: var(--white);
      padding: 12px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-log:hover:not(:disabled) { background: var(--slate-800); }
    .btn-log:disabled { background: var(--slate-950); border-color: var(--slate-900); cursor: not-allowed; color: var(--slate-600); }

    .btn-complete-ex {
      width: 100%;
      background: var(--slate-800);
      border: 1px solid var(--slate-700);
      color: var(--white);
      padding: 12px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-complete-ex:hover { background: var(--slate-700); }

    .btn-session {
      width: 100%;
      background: var(--slate-950);
      border: 1px solid var(--slate-800);
      border-radius: 6px;
      padding: 10px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--white);
    }
    .btn-session:hover { border-color: var(--cyan-700); }

    .btn-history {
      width: 100%;
      background: var(--slate-950);
      border: 1px solid var(--slate-800);
      color: var(--slate-400);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
    }
    .btn-history:hover { border-color: var(--cyan-700); }

    .btn-resume {
      flex: 1;
      background: var(--blue-600);
      color: var(--white);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .btn-resume:hover { background: var(--blue-700); }

    .btn-abandon {
      flex: 1;
      background: var(--slate-800);
      border: 1px solid var(--slate-700);
      color: var(--slate-400);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
    }
    .btn-abandon:hover { background: var(--slate-700); }

    .btn-clear-all {
      background: none;
      color: var(--red-600);
      border: 1px solid var(--red-900);
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .btn-clear-all:hover { color: var(--red-400); border-color: #b91c1c; }

    .btn-delete-day {
      background: none;
      color: var(--red-800);
      padding: 2px;
      line-height: 1;
    }
    .btn-delete-day:hover { color: var(--red-500); }

    .btn-weight {
      background: var(--slate-900);
      color: var(--white);
      width: 40px;
      height: 40px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .btn-weight:hover { background: var(--slate-800); }

    /* ── Inputs ── */
    input[type="number"] {
      background: var(--slate-900);
      color: var(--cyan-400);
      border: none;
      border-radius: 6px;
      text-align: center;
      font-family: inherit;
      outline: none;
      width: 100%;
    }
    input[type="number"]:focus { box-shadow: 0 0 0 1px var(--slate-700); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .input-weight { font-size: 1.25rem; font-weight: 700; padding: 8px; flex: 1; }
    .input-reps   { font-size: 1.5rem;  font-weight: 700; padding: 12px; }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--slate-950);
      border: 1px solid var(--slate-900);
      border-radius: 8px;
      padding: 8px;
    }
    .progress-bar-track {
      background: var(--slate-900);
      border-radius: 9999px;
      height: 6px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar-fill {
      background: linear-gradient(to right, var(--cyan-600), var(--cyan-400));
      height: 100%;
      border-radius: 9999px;
      transition: width 0.3s ease;
    }
    .progress-bar-labels { display: flex; justify-content: space-between; font-size: 0.75rem; }

    /* ── Exercise list item ── */
    .exercise-item {
      width: 100%;
      background: var(--slate-950);
      border: 1px solid var(--slate-900);
      border-radius: 6px;
      padding: 10px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--white);
    }
    .exercise-item:hover { border-color: var(--slate-800); }
    .exercise-item.done  { border-color: var(--slate-700); background: var(--slate-900); }

    /* ── Set rows ── */
    .set-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--slate-900);
      padding: 8px;
      border-radius: 6px;
    }

    /* ── PR badges ── */
    .pr-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .pr-badge  {
      background: var(--yellow-950);
      color: var(--yellow-600);
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Progression status ── */
    .progression {
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      margin-bottom: 12px;
    }
    .progression.increase { background: var(--green-950); border: 1px solid #14532d; color: var(--green-400); }
    .progression.good     { background: var(--blue-950);  border: 1px solid var(--blue-900); color: var(--blue-400); }
    .progression.maintain { background: var(--yellow-950); border: 1px solid var(--yellow-900); color: var(--yellow-400); }

    /* ── Stats grid ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: center; }

    /* ── Resume banner ── */
    .resume-banner { background: var(--blue-950); border: 1px solid var(--blue-800); border-radius: 8px; padding: 12px; }

    /* ── Utility ── */
    .space-y-2 > * + * { margin-top: 8px; }
    .space-y-3 > * + * { margin-top: 12px; }
    .flex        { display: flex; }
    .flex-row    { display: flex; gap: 8px; }
    .gap-2       { gap: 8px; }
    .mt-2        { margin-top: 8px; }
    .mt-3        { margin-top: 12px; }
    .mt-4        { margin-top: 16px; }
    .mb-2        { margin-bottom: 8px; }
    .mb-3        { margin-bottom: 12px; }
    .mb-4        { margin-bottom: 16px; }
    .mb-6        { margin-bottom: 24px; }
    .text-center { text-align: center; }
    .strikethrough { text-decoration: line-through; color: var(--slate-500); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem; }
    .line-through { text-decoration: line-through; }

    /* ── Export button ── */
    .btn-export {
      width: 100%;
      background: var(--slate-950);
      border: 1px solid var(--slate-700);
      color: var(--cyan-400);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      margin-top: 8px;
    }
    .btn-export:hover { border-color: var(--cyan-600); }

    /* ── Note box ── */
    .note-box {
      background: var(--slate-900);
      border: 1px solid var(--slate-800);
      border-radius: 6px;
      padding: 8px;
      font-size: 0.75rem;
      color: var(--slate-500);
    }

    /* ── Modified label ── */
    .modified-label { color: var(--yellow-600); font-size: 0.75rem; margin-top: 4px; text-align: center; }

    /* chevron svg */
    .chevron { color: var(--slate-700); flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

// ============================================================
// DATA
// ============================================================
const WORKOUTS = {
  A: [
    { name: 'Flat Bench Press',          weight: 80,    targetReps: '6-8',   rest: '3-4 min' },
    { name: 'Leg Press',                 weight: 190,   targetReps: '12-15', rest: '2-3 min' },
    { name: 'Seated Cable Row',          weight: 85,    targetReps: '8-10',  rest: '2-3 min' },
    { name: 'Lateral DB Raise',          weight: 14,    targetReps: '12-15', rest: '1.5-2 min' },
    { name: 'Incline DB Curl',           weight: 16,    targetReps: '8-10',  rest: '1.5-2 min' },
    { name: 'Rope Pushdown',             weight: 35,    targetReps: '8-10',  rest: '1.5-2 min' },
  ],
  B: [
    { name: 'Deadlift',                  weight: 107.5, targetReps: '5-7',   rest: '3-4 min',  notes: 'Form priority' },
    { name: 'Seated DB Press',           weight: 28,    targetReps: '8-10',  rest: '2-3 min' },
    { name: 'Lat Pulldown',              weight: 85,    targetReps: '8-10',  rest: '2-3 min',  notes: 'Use straps + wider grip' },
    { name: 'Hammer Curl',               weight: 18,    targetReps: '8-10',  rest: '1.5-2 min' },
    { name: 'Leg Extension',             weight: 82,    targetReps: '12-15', rest: '2 min' },
    { name: 'Barbell Curl',              weight: 37.5,  targetReps: '8-10',  rest: '1.5-2 min' },
  ],
  C: [
    { name: 'Incline DB Bench',          weight: 30,    targetReps: '8-10',  rest: '2-3 min' },
    { name: 'Single Arm Cable Row',      weight: 36,    targetReps: '8-10',  rest: '2-3 min',  notes: 'Try straps' },
    { name: 'Weighted Crunch',           weight: 32.5,  targetReps: '12-15', rest: '1.5-2 min' },
    { name: 'Cable Face Pull',           weight: 36.25, targetReps: '12-15', rest: '1.5-2 min' },
    { name: 'Overhead Tricep Extension', weight: 30,    targetReps: '8-10',  rest: '1.5-2 min' },
    { name: 'Hanging Knee Raise',        weight: 0,     targetReps: '15-20', rest: '1.5-2 min' },
  ],
};

const MAX_SETS = 3;

// ============================================================
// STORAGE
// ============================================================
const loadLS = (key)        => { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } };
const saveLS = (key, value) => localStorage.setItem(key, JSON.stringify(value));
const removeLS = (key)      => localStorage.removeItem(key);

// ============================================================
// STATE
// ============================================================
let state = {
  view:           'select',   // 'select' | 'workout' | 'exercise' | 'history' | 'settings'
  sessionType:    null,
  activeSession:  null,
  activeExercise: null,
  // exercise screen local state
  sets:           [],
  weight:         0,
  repInput:       '',
  history:        [],
};

function initState() {
  state.history       = loadLS('workoutHistory') || [];
  state.activeSession = loadLS('currentSession') || null;
}

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ============================================================
// HELPERS
// ============================================================
function detectPRs(exerciseName, newSet, currentSets) {
  const ex         = state.history.filter(e => e.exercise === exerciseName);
  const shownTypes = new Set(currentSets.flatMap(s => (s.prs || []).map(p => p.type)));
  const allSets    = ex.flatMap(h => h.sets);
  const prs        = [];

  const maxWeight = Math.max(0, ...allSets.map(s => s.weight));
  if (newSet.weight > maxWeight && !shownTypes.has('weight'))
    prs.push({ type: 'weight', icon: '⭐', message: 'Weight PR!' });

  const maxRepsAtWeight = Math.max(0, ...allSets.filter(s => s.weight === newSet.weight).map(s => s.reps));
  if (newSet.reps > maxRepsAtWeight && !shownTypes.has('reps'))
    prs.push({ type: 'reps', icon: '🔥', message: 'Rep PR!' });

  const maxVolume = Math.max(0, ...allSets.map(s => s.weight * s.reps));
  if (newSet.weight * newSet.reps > maxVolume && !shownTypes.has('volume'))
    prs.push({ type: 'volume', icon: '💪', message: 'Volume PR!' });

  return prs;
}

function getProgressionStatus(exercise, sets) {
  if (sets.length < MAX_SETS) return null;
  const [min, max] = exercise.targetReps.split('-').map(Number);
  if (sets.every(s => s.reps >= max)) return { status: 'increase', message: '✓ MAXED — increase weight next time!' };
  if (sets.every(s => s.reps >= min)) return { status: 'good',     message: '✓ Good progress' };
  return                                      { status: 'maintain', message: 'Push for higher reps' };
}

function getExerciseHistory(name) {
  return state.history.filter(e => e.exercise === name).slice(0, 5);
}

function getQuickStats() {
  if (!state.history.length) return null;
  const dates   = [...new Set(state.history.map(e => new Date(e.date).toDateString()))];
  const daysAgo = Math.floor((Date.now() - new Date(dates[0])) / 86400000);
  const weekAgo = new Date(Date.now() - 7 * 86400000);
  return {
    lastWorkout:      daysAgo === 0 ? 'Today' : daysAgo === 1 ? 'Yesterday' : `${daysAgo}d ago`,
    thisWeekSessions: dates.filter(d => new Date(d) >= weekAgo).length,
  };
}

function completedExercises() {
  return state.activeSession?.exercises.map(e => e.exercise) || [];
}

// ============================================================
// GOOGLE SHEETS SYNC
// ============================================================
// Paste your Apps Script Web App URL here after setup:
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyuEmiw_M-mMHS0IWN-9y4VbWJhzGZYysQizYEOSMISxnlz8aukSqRrzVQPijodigne/exec';

async function syncToSheets(entries) {
  if (!SHEETS_URL) return; // not configured yet
  try {
    await fetch(SHEETS_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(entries),
    });
  } catch (e) {
    console.warn('Sheets sync failed:', e);
  }
}

// ============================================================
// ACTIONS
// ============================================================
function startSession(type) {
  const existing = state.activeSession;
  const session  = (existing && existing.sessionType === type)
    ? existing
    : { sessionType: type, exercises: [], startedAt: new Date().toISOString() };
  saveLS('currentSession', session);
  setState({ view: 'workout', sessionType: type, activeSession: session });
}

function resumeSession() {
  setState({ view: 'workout', sessionType: state.activeSession.sessionType });
}

function abandonSession() {
  if (!confirm('Abandon session? All progress will be lost.')) return;
  removeLS('currentSession');
  setState({ view: 'select', sessionType: null, activeSession: null });
}

function completeSession() {
  if (!state.activeSession?.exercises.length) return;
  const ts      = new Date().toISOString();
  const entries = state.activeSession.exercises.map(ex => ({ ...ex, date: ts, session: state.activeSession.sessionType }));
  const history = [...entries, ...state.history];
  saveLS('workoutHistory', history);
  removeLS('currentSession');
  syncToSheets(entries); // fire-and-forget to Google Sheets
  setState({ view: 'select', sessionType: null, activeSession: null, history });
}

function selectExercise(exercise) {
  const history    = getExerciseHistory(exercise.name);
  const lastWeight = history[0]?.sets[0].weight ?? exercise.weight;
  setState({ view: 'exercise', activeExercise: exercise, sets: [], weight: lastWeight, repInput: '' });
}

function addSet() {
  const reps = parseInt(state.repInput);
  if (!reps || reps <= 0) return;
  const newSet  = { reps, weight: state.weight, prs: detectPRs(state.activeExercise.name, { reps, weight: state.weight }, state.sets) };
  const sets    = [...state.sets, newSet];
  const repInput = sets.length < MAX_SETS ? String(reps) : '';
  setState({ sets, repInput });
}

function removeLastSet() {
  setState({ sets: state.sets.slice(0, -1) });
}

function completeExercise() {
  const entry   = { exercise: state.activeExercise.name, sets: state.sets };
  const session = { ...state.activeSession, exercises: [...state.activeSession.exercises, entry] };
  saveLS('currentSession', session);
  setState({ view: 'workout', activeSession: session, activeExercise: null, sets: [], weight: 0, repInput: '' });
}

function deleteHistoryDay(dateStr) {
  if (!confirm(`Delete all entries for ${dateStr}?`)) return;
  const history = state.history.filter(e => new Date(e.date).toLocaleDateString() !== dateStr);
  saveLS('workoutHistory', history);
  setState({ history });
}

function clearAllHistory() {
  if (!confirm('Clear ALL workout history? This cannot be undone.')) return;
  saveLS('workoutHistory', []);
  setState({ history: [] });
}

function exportHistory() {
  const data = JSON.stringify(state.history, null, 2);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(data).then(() => alert('History copied to clipboard! Paste it into your chat with Claude.'));
  } else {
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = data;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('History copied to clipboard! Paste it into your chat with Claude.');
  }
}

// ============================================================
// SVG ICONS
// ============================================================
const icons = {
  chevron: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron"><polyline points="9 18 15 12 9 6"/></svg>`,
  check:   `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  check24: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  plus:    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  x:       `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  x14:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  cal:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
};

// ============================================================
// PROGRESS BAR HTML
// ============================================================
function progressBarHTML(completed, total, sessionType) {
  const pct = total > 0 ? (completed / total) * 100 : 0;
  return `
    <div class="progress-bar-wrap mb-4">
      <div class="progress-bar-labels">
        <span class="text-cyan" style="font-size:0.75rem">SESSION ${sessionType}</span>
        <span class="text-muted" style="font-size:0.75rem">${completed}/${total} COMPLETE</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>`;
}

// ============================================================
// RENDER SCREENS
// ============================================================
function renderSelect() {
  const stats   = getQuickStats();
  const session = state.activeSession;
  const done    = completedExercises();

  let statsHTML = '';
  if (stats) {
    statsHTML = `
      <div class="card mb-4">
        <div class="stats-grid">
          <div>
            <div class="text-cyan" style="font-size:1.125rem;font-weight:700">${stats.lastWorkout}</div>
            <div class="label">Last workout</div>
          </div>
          <div>
            <div class="text-cyan" style="font-size:1.125rem;font-weight:700">${stats.thisWeekSessions}</div>
            <div class="label">This week</div>
          </div>
        </div>
      </div>`;
  }

  let resumeHTML = '';
  if (session && session.exercises.length > 0) {
    resumeHTML = `
      <div class="resume-banner mb-4">
        <div style="font-weight:700;font-size:0.875rem;color:var(--blue-300);margin-bottom:2px">Session ${session.sessionType} in progress</div>
        <div style="font-size:0.75rem;color:var(--blue-400);margin-bottom:8px">${session.exercises.length}/${WORKOUTS[session.sessionType].length} exercises complete</div>
        <div class="flex-row">
          <button class="btn-resume" onclick="resumeSession()">RESUME</button>
          <button class="btn-abandon" onclick="abandonSession()">ABANDON</button>
        </div>
      </div>`;
  }

  const sessionBtns = ['A', 'B', 'C'].map(s => `
    <button class="btn-session" onclick="startSession('${s}')">
      <div>
        <div style="font-size:1.125rem;font-weight:700;color:var(--white)">Session ${s}</div>
        <div style="font-size:0.75rem;font-weight:600;color:var(--slate-600)">${WORKOUTS[s].length} exercises · ${WORKOUTS[s].length * MAX_SETS} sets</div>
      </div>
      ${icons.chevron}
    </button>`).join('');

  return `
    <div class="screen">
      <div class="container container--home">
        <div class="text-center mb-6">
          <h1 class="title-xl mb-1">Workout Tracker</h1>
          <p class="label">Select session</p>
        </div>
        ${statsHTML}
        ${resumeHTML}
        <div class="space-y-2 mb-4">${sessionBtns}</div>
        <button class="btn-history" onclick="setState({view:'history'})">VIEW HISTORY</button>
        <button class="btn-history mt-2" onclick="setState({view:'settings'})" style="color:var(--slate-500)">⚙️ SETTINGS</button>
        <button class="btn-export" onclick="exportHistory()">📋 EXPORT HISTORY FOR CLAUDE</button>
      </div>
    </div>`;
}

function renderWorkout() {
  const type     = state.sessionType;
  const exercises = WORKOUTS[type];
  const done     = completedExercises();

  const items = exercises.map((ex, idx) => {
    const history   = getExerciseHistory(ex.name);
    const recent    = history[0];
    const maxWeight = history.length ? Math.max(...history.flatMap(h => h.sets.map(s => s.weight))) : 0;
    const isDone    = done.includes(ex.name);

    let recentHTML = '';
    if (recent) {
      recentHTML = `
        <div class="flex-row mt-2" style="gap:6px">
          <span style="background:var(--slate-900);color:var(--slate-500);padding:2px 6px;border-radius:4px;font-size:0.75rem">${recent.sets.map(s => s.reps).join('-')}</span>
          ${maxWeight > 0 ? `<span style="background:var(--yellow-950);color:var(--yellow-600);padding:2px 6px;border-radius:4px;font-size:0.75rem">⭐${maxWeight}kg</span>` : ''}
        </div>`;
    }

    return `
      <button class="exercise-item ${isDone ? 'done' : ''}" onclick="selectExercise(${idx})">
        <div style="flex:1">
          <div class="flex-row mb-1" style="align-items:center">
            <div style="font-size:0.875rem;font-weight:600;${isDone ? 'text-decoration:line-through;color:var(--slate-500)' : 'color:var(--white)'}">${ex.name}</div>
            ${isDone ? '<span style="color:var(--green-600);font-size:0.75rem">✓</span>' : ''}
          </div>
          <div style="font-size:0.75rem;color:var(--slate-600)">${ex.weight > 0 ? ex.weight + 'kg' : 'BW'} × ${ex.targetReps}</div>
          ${recentHTML}
        </div>
        ${icons.chevron}
      </button>`;
  }).join('');

  let bottomHTML = '';
  if (done.length > 0) {
    bottomHTML = `
      <div class="mt-4 space-y-2">
        <button class="btn-primary" onclick="completeSession()">
          ${icons.check} COMPLETE SESSION (${done.length}/${exercises.length})
        </button>
        <button class="btn-secondary" onclick="abandonSession()">Abandon Session</button>
      </div>`;
  }

  return `
    <div class="screen">
      <div class="container">
        <button class="btn-back" onclick="setState({view:'select',sessionType:null})">← BACK</button>
        ${progressBarHTML(done.length, exercises.length, type)}
        <div class="space-y-2">${items}</div>
        ${bottomHTML}
      </div>
    </div>`;
}

function renderExercise() {
  const ex          = state.activeExercise;
  const history     = getExerciseHistory(ex.name);
  const lastSession = history[0] || null;
  const done        = completedExercises();
  const total       = WORKOUTS[state.sessionType].length;
  const progression = state.sets.length === MAX_SETS ? getProgressionStatus(ex, state.sets) : null;

  // Last session panel
  let lastHTML = '';
  if (lastSession) {
    lastHTML = `
      <div class="card--inner mb-3">
        <div class="label mb-1">LAST SESSION:</div>
        <div style="font-size:0.875rem;color:var(--slate-400)">${lastSession.sets.map(s => s.reps).join('-')} @ ${lastSession.sets[0].weight}kg</div>
      </div>`;
  }

  // Weight modified warning
  const modifiedHTML = (lastSession && state.weight !== lastSession.sets[0].weight)
    ? `<div class="modified-label">Modified from last session (${lastSession.sets[0].weight}kg)</div>`
    : '';

  // Sets list
  let setsHTML = state.sets.length === 0
    ? `<p class="text-muted text-center" style="padding:12px 0;font-size:0.75rem">NO SETS LOGGED</p>`
    : state.sets.map((set, idx) => `
        <div>
          <div class="set-row">
            <span style="font-size:0.75rem;color:var(--slate-500)">SET ${idx + 1}</span>
            <span style="font-weight:600">${set.weight}kg × ${set.reps}</span>
          </div>
          ${set.prs?.length > 0 ? `<div class="pr-badges">${set.prs.map(p => `<div class="pr-badge">${p.icon} ${p.message}</div>`).join('')}</div>` : ''}
        </div>`).join('');

  // Remove last set button
  const removeHTML = state.sets.length > 0
    ? `<button class="btn-danger mb-3" onclick="removeLastSet()">${icons.x} REMOVE LAST SET</button>`
    : '';

  // Progression
  const progHTML = progression
    ? `<div class="progression ${progression.status}">${progression.message}</div>`
    : '';

  // Rep input + log button OR complete button
  let actionHTML = '';
  if (state.sets.length < MAX_SETS) {
    const placeholder = (lastSession && state.sets.length === 0) ? lastSession.sets[0].reps.toString() : '0';
    actionHTML = `
      <div class="mb-2">
        <div class="label mb-1">REPS — SET ${state.sets.length + 1}</div>
        <input id="repInput" type="number" inputmode="numeric" value="${state.repInput}"
               placeholder="${placeholder}" class="input-reps"
               oninput="state.repInput=this.value"
               onkeydown="if(event.key==='Enter')addSet()" />
      </div>
      <button class="btn-log" onclick="addSet()" ${!state.repInput || Number(state.repInput) <= 0 ? 'disabled' : ''}>
        ${icons.plus} LOG SET ${state.sets.length + 1}
      </button>`;
  } else {
    actionHTML = `
      <button class="btn-complete-ex" onclick="completeExercise()">
        ${icons.check24} COMPLETE EXERCISE
      </button>`;
  }

  // Notes
  const notesHTML = ex.notes
    ? `<div class="note-box mt-3">💡 ${ex.notes}</div>`
    : '';

  // History (older entries)
  let historyHTML = '';
  if (history.length > 1) {
    historyHTML = `
      <div class="card">
        <div class="title-sm mb-2">HISTORY</div>
        <div class="space-y-2">
          ${history.slice(1).map(entry => `
            <div class="card--inner">
              <div class="label mb-1">${new Date(entry.date).toLocaleDateString()}</div>
              <div style="font-size:0.75rem;color:var(--white)">${entry.sets.map(s => s.reps).join('-')} @ ${entry.sets[0].weight}kg</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  return `
    <div class="screen">
      <div class="container">
        <button class="btn-back" onclick="setState({view:'workout',activeExercise:null,sets:[],repInput:''})">← BACK</button>
        ${progressBarHTML(done.length, total, state.sessionType)}

        <div class="card mb-3">
          <h2 class="title-lg mb-2">${ex.name}</h2>
          ${lastHTML}
          <div class="mb-3">
            <div class="label mb-1">WEIGHT (KG)</div>
            <div class="flex-row" style="align-items:center">
              <button class="btn-weight" onclick="setState({weight:Math.max(0,state.weight-2.5)})">−</button>
              <input type="number" inputmode="decimal" value="${state.weight}" class="input-weight"
                     onchange="setState({weight:Math.max(0,parseFloat(this.value)||0)})" />
              <button class="btn-weight" onclick="setState({weight:state.weight+2.5})">+</button>
            </div>
            ${modifiedHTML}
          </div>
          <div class="grid-2 mb-3">
            <div class="card--inner"><span class="label">TARGET: </span><span>${ex.targetReps}</span></div>
            <div class="card--inner"><span class="label">REST: </span><span>${ex.rest}</span></div>
          </div>
          ${notesHTML}
        </div>

        <div class="card mb-3">
          <div class="title-sm mb-3">SETS (${state.sets.length}/${MAX_SETS})</div>
          ${state.sets.length > 0 ? `<div class="space-y-2 mb-3">${setsHTML}</div>` : setsHTML}
          ${removeHTML}
          ${progHTML}
          ${actionHTML}
        </div>

        ${historyHTML}
      </div>
    </div>`;
}

function renderHistory() {
  const grouped = state.history.reduce((acc, entry) => {
    const date = new Date(entry.date).toLocaleDateString();
    if (!acc[date]) acc[date] = [];
    acc[date].push(entry);
    return acc;
  }, {});

  const clearBtn = state.history.length > 0
    ? `<button class="btn-clear-all" onclick="clearAllHistory()">CLEAR ALL</button>`
    : '';

  let bodyHTML = '';
  if (Object.keys(grouped).length === 0) {
    bodyHTML = `<div class="card text-center" style="padding:24px"><p style="color:var(--slate-600);font-size:0.875rem">NO HISTORY YET</p></div>`;
  } else {
    bodyHTML = `<div class="space-y-3">` + Object.entries(grouped).map(([date, entries]) => `
      <div class="card">
        <div class="flex mb-2" style="justify-content:space-between;align-items:center">
          <div class="label flex" style="gap:6px;align-items:center">${icons.cal} ${date}</div>
          <button class="btn-delete-day" onclick="deleteHistoryDay('${date}')">${icons.x14}</button>
        </div>
        <div class="space-y-2">
          ${entries.map(entry => `
            <div class="card--inner">
              <div style="font-weight:600;font-size:0.75rem;margin-bottom:2px">${entry.session}: ${entry.exercise}</div>
              <div style="font-size:0.75rem;color:var(--slate-400)">${entry.sets.map(s => s.reps).join('-')} @ ${entry.sets[0].weight}kg</div>
            </div>`).join('')}
        </div>
      </div>`).join('') + `</div>`;
  }

  return `
    <div class="screen">
      <div class="container">
        <button class="btn-back" onclick="setState({view:'select'})">← BACK</button>
        <div class="flex mb-4" style="justify-content:space-between;align-items:center">
          <h2 class="title-xl">HISTORY</h2>
          ${clearBtn}
        </div>
        ${bodyHTML}
      </div>
    </div>`;
}

// ============================================================
// EXERCISE INDEX → OBJECT (used by workout screen onclick)
// ============================================================
function selectExercise(idx) {
  const ex = WORKOUTS[state.sessionType][idx];
  const history    = getExerciseHistory(ex.name);
  const lastWeight = history[0]?.sets[0].weight ?? ex.weight;
  setState({ view: 'exercise', activeExercise: ex, sets: [], weight: lastWeight, repInput: '' });
}

// ============================================================
// SETTINGS SCREEN
// ============================================================
function renderSettings() {
  const configured = !!SHEETS_URL;
  return `
    <div class="screen">
      <div class="container">
        <button class="btn-back" onclick="setState({view:'select'})">← BACK</button>
        <h2 class="title-xl mb-4">SETTINGS</h2>

        <div class="card mb-3">
          <div class="title-sm mb-2">Google Sheets Sync</div>
          <div style="font-size:0.75rem;color:var(--slate-500);margin-bottom:12px;line-height:1.5">
            ${configured
              ? '✅ Connected — sessions auto-sync after completion.'
              : '⚠️ Not configured. Follow the setup steps below to enable auto-sync.'}
          </div>
          <div style="font-size:0.75rem;color:var(--slate-400);line-height:1.8">
            <strong style="color:var(--white)">Setup (one time):</strong><br>
            1. Create a Google Sheet<br>
            2. Extensions → Apps Script → paste the script Claude provides<br>
            3. Deploy → Web App → Anyone → Copy URL<br>
            4. Edit this HTML file: set <code style="color:var(--cyan-400)">SHEETS_URL = 'your-url'</code>
          </div>
        </div>

        <div class="card">
          <div class="title-sm mb-2">Export History</div>
          <div style="font-size:0.75rem;color:var(--slate-500);margin-bottom:12px">
            Copy all workout history to clipboard for pasting into Claude.
          </div>
          <button class="btn-export" onclick="exportHistory()" style="margin-top:0">📋 COPY HISTORY FOR CLAUDE</button>
        </div>
      </div>
    </div>`;
}

// ============================================================
// RENDER DISPATCHER
// ============================================================
function render() {
  const app = document.getElementById('app');
  switch (state.view) {
    case 'select':   app.innerHTML = renderSelect();   break;
    case 'workout':  app.innerHTML = renderWorkout();  break;
    case 'exercise': app.innerHTML = renderExercise(); break;
    case 'history':  app.innerHTML = renderHistory();  break;
    case 'settings': app.innerHTML = renderSettings(); break;
  }
  // Re-focus rep input if on exercise screen
  if (state.view === 'exercise' && state.sets.length < MAX_SETS) {
    const input = document.getElementById('repInput');
    if (input) input.focus();
  }
}

// ============================================================
// BOOT
// ============================================================
initState();
render();
</script>
</body>
</html>
