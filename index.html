<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workout Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #070b14;
      --bg-card:    #0d1424;
      --bg-inner:   #111d35;
      --bg-deep:    #080f1e;
      --border:     #1a2540;
      --border-mid: #243050;
      --border-hi:  #2e3f6a;
      --cyan:       #22d3ee;
      --cyan-dim:   #0891b2;
      --cyan-glow:  rgba(34,211,238,0.12);
      --cyan-glow2: rgba(34,211,238,0.06);
      --white:      #e8f2ff;
      --muted:      #506888;
      --text-mid:   #8aadd4;
      --text-dim:   #607898;
      --green:      #22c55e;
      --green-dim:  #14532d;
      --green-bg:   #071a0f;
      --blue:       #60a5fa;
      --blue-dim:   #1e3a8a;
      --blue-bg:    #060f25;
      --red:        #f87171;
      --red-dim:    #7f1d1d;
      --red-bg:     #1a0808;
      --yellow:     #fbbf24;
      --yellow-dim: #78350f;
      --yellow-bg:  #1a1000;
      --amber:      #fbbf24;
      --orange:     #fb923c;
      --violet:       #a78bfa;
      --violet-dim:   #5b21b6;
      --violet-mid:   #7c3aed;
      --violet-glow:  rgba(167,139,250,0.14);
      --violet-glow2: rgba(167,139,250,0.07);
    }

    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    #app { min-height: 100vh; position: relative; z-index: 1; }

    /* ── Screen fade ── */
    .screen {
      min-height: 100vh;
      padding: 12px 12px 32px;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn    { from { opacity: 0; transform: translateY(6px); }   to { opacity: 1; transform: none; } }
    @keyframes slideBack { from { opacity: 0; transform: translateX(-24px); } to { opacity: 1; transform: none; } }
    .screen          { animation: fadeIn    0.18s ease; }
    .screen.back     { animation: slideBack 0.2s ease; }

    .container      { max-width: 448px; margin: 0 auto; padding-top: 8px; }
    .container--home { padding-top: 28px; }

    /* ── Typography ── */
    .title-xl  { font-size: 1.5rem;   font-weight: 800; color: var(--white);    letter-spacing: -0.02em; }
    .title-lg  { font-size: 1.125rem; font-weight: 700; color: var(--white); }
    .title-sm  { font-size: 0.75rem;  font-weight: 700; color: var(--text-mid); letter-spacing: 0.08em; text-transform: uppercase; }
    .label     { font-size: 0.7rem;   color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
    .text-cyan { color: var(--cyan); }
    .text-muted { color: var(--muted); }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      position: relative;
    }
    .card--glow {
      box-shadow: 0 0 0 1px var(--border), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .card--inner {
      background: var(--bg-inner);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .card--deep {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }

    /* ── Buttons ── */
    button { cursor: pointer; border: none; font-family: inherit; transition: all 0.15s ease; -webkit-tap-highlight-color: transparent; }
    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
    }

    .btn-back {
      background: none;
      color: var(--text-dim);
      font-size: 0.75rem;
      padding: 0;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-back:hover { color: var(--cyan); }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: var(--white);
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(22,163,74,0.3);
      letter-spacing: 0.02em;
    }
    .btn-primary:hover  { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 4px 16px rgba(22,163,74,0.45); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }
    .btn-secondary:hover { border-color: var(--border-hi); color: var(--white); }

    .btn-danger {
      width: 100%;
      background: var(--red-bg);
      border: 1px solid var(--red-dim);
      color: var(--red);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.04em;
    }
    .btn-danger:hover { background: rgba(127,29,29,0.3); }

    .btn-log {
      width: 100%;
      background: linear-gradient(135deg, var(--bg-inner), var(--bg-card));
      border: 1px solid var(--border-hi);
      color: var(--white);
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.02em;
    }
    .btn-log:hover:not(:disabled) { border-color: var(--cyan-dim); background: linear-gradient(135deg, rgba(245,158,11,0.08), var(--bg-card)); box-shadow: 0 0 12px var(--cyan-glow); }
    .btn-log:active:not(:disabled) { transform: scale(0.98); }
    .btn-log:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-complete-ex {
      width: 100%;
      background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06));
      border: 1px solid var(--cyan-dim);
      color: var(--cyan);
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 0 16px var(--cyan-glow);
      letter-spacing: 0.02em;
    }
    .btn-complete-ex:hover  { background: linear-gradient(135deg, rgba(245,158,11,0.18), rgba(245,158,11,0.1)); box-shadow: 0 0 24px rgba(245,158,11,0.2); }
    .btn-complete-ex:active { transform: scale(0.98); }

    .btn-session {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }
    .btn-session::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--violet-glow2), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-session:hover { border-color: var(--violet-dim); }
    .btn-session:hover::before { opacity: 1; }
    .btn-session.next-session {
      border-color: var(--violet-mid);
      box-shadow: 0 0 14px var(--violet-glow), inset 0 1px 0 rgba(167,139,250,0.1);
    }
    .btn-session.next-session::before { opacity: 1; background: linear-gradient(135deg, var(--violet-glow), transparent); }

    .btn-nav {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }
    .btn-nav:hover { border-color: var(--border-hi); color: var(--text-mid); }

    .btn-resume {
      flex: 1;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: var(--white);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .btn-resume:hover { background: linear-gradient(135deg, #3b82f6, #2563eb); }

    .btn-abandon {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.75rem;
    }
    .btn-abandon:hover { border-color: var(--red-dim); color: var(--red); }

    .btn-clear-all {
      background: none;
      color: var(--red-dim);
      border: 1px solid var(--red-dim);
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.04em;
    }
    .btn-clear-all:hover { color: var(--red); border-color: var(--red); }

    .btn-delete-day {
      background: none;
      color: var(--red-dim);
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
    }
    .btn-delete-day:hover { color: var(--red); }

    .btn-edit-day {
      background: none;
      color: var(--text-mid);
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
    }
    .btn-edit-day:hover { color: var(--amber); }

    .date-edit-input {
      background: var(--bg-inner);
      border: 1px solid var(--amber);
      border-radius: 6px;
      color: var(--white);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 6px;
      outline: none;
      color-scheme: dark;
    }


    .btn-export {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-hi);
      color: var(--cyan);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }
    .btn-export:hover { background: var(--cyan-glow); }

    /* ── Inputs ── */
    input[type="number"], input[type="text"] {
      background: var(--bg-inner);
      color: var(--white);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      text-align: center;
      font-family: inherit;
      outline: none;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="number"]:focus, input[type="text"]:focus {
      border-color: var(--cyan-dim);
      box-shadow: 0 0 0 3px var(--cyan-glow);
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .input-weight {
      font-size: 1.375rem;
      font-weight: 700;
      padding: 10px;
      flex: 1;
      color: var(--cyan);
    }
    .rep-display {
      font-size: 2.5rem;
      font-weight: 800;
      text-align: center;
      padding: 14px;
      color: var(--cyan);
      letter-spacing: -0.02em;
      background: var(--bg-inner);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
    }
    .rep-display.empty { color: var(--text-dim); }
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .numpad-key {
      background: var(--bg-inner);
      border: 1px solid var(--border-mid);
      color: var(--white);
      border-radius: 10px;
      padding: 18px 8px;
      font-size: 1.25rem;
      font-weight: 700;
    }
    .numpad-key:hover  { border-color: var(--border-hi); color: var(--cyan); }
    .numpad-key:active { transform: scale(0.93); }
    .numpad-key.backspace { color: var(--red); }
    .numpad-key.zero { grid-column: span 2; }
    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .progress-bar-track {
      background: var(--bg-deep);
      border-radius: 9999px;
      height: 5px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-bar-fill {
      background: linear-gradient(to right, var(--violet-mid), var(--cyan));
      height: 100%;
      border-radius: 9999px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 8px rgba(245,158,11,0.4);
    }
    .progress-bar-labels { display: flex; justify-content: space-between; }

    /* ── Exercise list item ── */
    .exercise-item {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--white);
      transition: border-color 0.15s, background 0.15s;
    }
    .exercise-item:hover  { border-color: var(--border-hi); }
    .exercise-item:active { transform: scale(0.99); }
    .exercise-item.done    { border-color: var(--border); background: rgba(245,158,11,0.03); }
    .exercise-item.partial { border-color: var(--cyan-dim); background: rgba(245,158,11,0.03); }

    /* ── Set rows (with slide-in animation) ── */
    .set-row-wrap {
      animation: slideIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .set-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-inner);
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 8px;
    }

    /* ── PR badges (with pop animation) ── */
    .pr-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .pr-badge {
      background: linear-gradient(135deg, rgba(167,139,250,0.18), rgba(167,139,250,0.08));
      border: 1px solid rgba(167,139,250,0.35);
      color: var(--violet);
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      animation: prPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 0.02em;
    }
    @keyframes prPop {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Progression status ── */
    .progression {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .progression.increase { background: var(--green-bg);  border: 1px solid var(--green-dim);  color: var(--green); }
    .progression.good     { background: var(--blue-bg);   border: 1px solid var(--blue-dim);   color: var(--blue); }
    .progression.maintain { background: var(--yellow-bg); border: 1px solid var(--yellow-dim); color: var(--yellow); }



    /* ── Exercise accent bar ── */
    .ex-header {
      display: flex;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 14px;
    }
    .ex-accent-bar {
      width: 3px;
      border-radius: 9999px;
      flex-shrink: 0;
    }
    .ex-accent-bar.session-A { background: linear-gradient(to bottom, var(--violet), var(--violet-dim)); }
    .ex-accent-bar.session-B { background: linear-gradient(to bottom, var(--cyan), var(--cyan-dim)); }
    .ex-accent-bar.session-C { background: linear-gradient(to bottom, var(--blue), var(--blue-dim)); }

    /* ── Filled checkmark ── */
    .check-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--green);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(34,197,94,0.4);
    }
    .check-circle svg { display: block; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 24px 16px;
      border: 1px dashed var(--border-mid);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .empty-state-icon { font-size: 2rem; margin-bottom: 8px; }
    .empty-state-title { font-size: 0.875rem; font-weight: 700; color: var(--text-mid); margin-bottom: 4px; }
    .empty-state-sub { font-size: 0.75rem; color: var(--text-dim); line-height: 1.5; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-item { text-align: center; padding: 10px 6px; }

    /* ── Resume banner ── */
    .resume-banner {
      background: linear-gradient(135deg, rgba(37,99,235,0.15), rgba(37,99,235,0.06));
      border: 1px solid #1e3a8a;
      border-radius: 12px;
      padding: 14px;
    }

    /* ── Next session badge ── */
    .next-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--violet);
      background: var(--violet-glow);
      border: 1px solid var(--violet-dim);
      border-radius: 9999px;
      padding: 2px 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }



    /* ── Utility ── */
    .space-y-2 > * + * { margin-top: 8px; }
    .space-y-3 > * + * { margin-top: 12px; }
    .flex       { display: flex; }
    .flex-row   { display: flex; gap: 8px; }
    .gap-2      { gap: 8px; }
    .mt-1       { margin-top: 4px; }
    .mt-2       { margin-top: 8px; }
    .mt-3       { margin-top: 12px; }
    .mt-4       { margin-top: 16px; }
    .mb-1       { margin-bottom: 4px; }
    .mb-2       { margin-bottom: 8px; }
    .mb-3       { margin-bottom: 12px; }
    .mb-4       { margin-bottom: 16px; }
    .mb-6       { margin-bottom: 24px; }
    .text-center { text-align: center; }
    .grid-2     { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem; }
    .divider    { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-inner);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 3px 10px;
      font-size: 0.7rem;
      color: var(--text-mid);
    }
    .note-box {
      background: rgba(251,191,36,0.06);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.75rem;
      color: var(--yellow);
    }
    .modified-label { color: var(--yellow); font-size: 0.7rem; margin-top: 6px; text-align: center; }
    .chevron { color: var(--muted); flex-shrink: 0; }

    /* ── Calendar ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-top: 8px;
    }
    .cal-day-label {
      text-align: center;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-day {
      height: 30px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      background: transparent;
      position: relative;
    }
    .cal-day.empty { pointer-events: none; }
    .cal-day.today { color: var(--white); }
    .cal-day.today::after {
      content: '';
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--cyan);
    }
    .cal-day.worked-A {
      background: linear-gradient(135deg, rgba(167,139,250,0.35), rgba(124,58,237,0.2));
      border: 1px solid rgba(167,139,250,0.3);
      color: var(--violet);
      font-weight: 800;
    }
    .cal-day.worked-B {
      background: linear-gradient(135deg, rgba(245,158,11,0.3), rgba(180,83,9,0.18));
      border: 1px solid rgba(245,158,11,0.3);
      color: var(--cyan);
      font-weight: 800;
    }
    .cal-day.worked-C {
      background: linear-gradient(135deg, rgba(96,165,250,0.25), rgba(30,58,138,0.2));
      border: 1px solid rgba(96,165,250,0.25);
      color: var(--blue);
      font-weight: 800;
    }
    .cal-nav {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1rem;
      padding: 2px 8px;
      border-radius: 4px;
      line-height: 1;
    }

      margin-bottom: 20px;

    select {

      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 14px;

      flex: 1;
      padding: 7px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      background: transparent;
      transition: all 0.15s;

    .graph-toggle-btn.active { background: var(--bg-card); color: var(--white); box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

      width: 100%;
      height: 180px;
      margin-bottom: 8px;

      justify-content: center;
      height: 180px;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .graph-stat-row {

      margin-top: 12px;

function initState() {
  // Seed FitNotes history on first load if localStorage is empty
  if (!localStorage.getItem('workoutHistory')) {
    saveLS('workoutHistory', SEED_HISTORY);
  }
  state.history       = loadLS('workoutHistory')  || [];
  state.activeSession = loadLS('currentSession')  || null;
}

let _goingBack = false;

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function goBack() {
  _goingBack = true;
  switch (state.view) {
    case 'workout':  setState({ view: 'select', sessionType: null }); break;
    case 'exercise': setState({ view: 'workout', activeExercise: null, sets: [], repInput: '' }); break;
    case 'history':  setState({ view: 'select' }); break;
    case 'settings': setState({ view: 'select' }); break;
  }
  _goingBack = false;
}

// HELPERS

function detectPRs(exerciseName, newSet, currentSets) {
  const ex         = state.history.filter(e => e.exercise === exerciseName);
  const shownTypes = new Set(currentSets.flatMap(s => (s.prs || []).map(p => p.type)));
  const allSets    = ex.flatMap(h => h.sets);
  const prs        = [];

  const maxWeight = Math.max(0, ...allSets.map(s => s.weight));
  if (newSet.weight > maxWeight && !shownTypes.has('weight'))
    prs.push({ type: 'weight', icon: '⭐', message: 'Weight PR!' });

  const maxRepsAtWeight = Math.max(0, ...allSets.filter(s => s.weight === newSet.weight).map(s => s.reps));
  if (newSet.reps > maxRepsAtWeight && !shownTypes.has('reps'))
    prs.push({ type: 'reps', icon: '🔥', message: 'Rep PR!' });

  const maxVolume = Math.max(0, ...allSets.map(s => s.weight * s.reps));
  if (newSet.weight * newSet.reps > maxVolume && !shownTypes.has('volume'))
    prs.push({ type: 'volume', icon: '💪', message: 'Volume PR!' });

  return prs;
}

function getProgressionStatus(exercise, sets) {
  if (sets.length < MAX_SETS) return null;
  const [min, max] = exercise.targetReps.split('-').map(Number);
  if (sets.every(s => s.reps >= max)) return { status: 'increase', message: '✓ MAXED — increase weight next session' };
  if (sets.every(s => s.reps >= min)) return { status: 'good',     message: '✓ Good — keep pushing' };
  return                                      { status: 'maintain', message: '↑ Push for more reps' };
}

function getExerciseHistory(name) {
  return state.history.filter(e => e.exercise === name).slice(0, 5);
}

function completedExercises() {
  // Only count exercises where all 3 sets are logged
  return (state.activeSession?.exercises || [])
    .filter(e => e.sets.length >= MAX_SETS)
    .map(e => e.exercise);
}

function partialExercises() {
  // Exercises saved with fewer than MAX_SETS sets
  return (state.activeSession?.exercises || [])
    .filter(e => e.sets.length < MAX_SETS)
    .map(e => ({ name: e.exercise, sets: e.sets.length }));
}

function getNextSession() {
  if (!state.history.length) return 'B';
  const lastSessions = [...new Set(state.history.map(e => e.session))];
  const last = lastSessions[0];
  const idx  = SESSION_ORDER.indexOf(last);
  return SESSION_ORDER[(idx + 1) % SESSION_ORDER.length];
}

function getQuickStats() {
  const sessionDates = [...new Set(state.history.map(e => new Date(e.date).toDateString()))];
  if (!sessionDates.length) return null;
  const daysAgo = Math.floor((Date.now() - new Date(sessionDates[0])) / 86400000);
  const totalSessions = sessionDates.length;
  const now       = new Date();
  const dayOfWeek = (now.getDay() + 6) % 7; // Mon=0 ... Sun=6
  const monday    = new Date(now);
  monday.setHours(0, 0, 0, 0);
  monday.setDate(now.getDate() - dayOfWeek);
  const thisWeek  = sessionDates.filter(d => new Date(d) >= monday).length;
  return {
    lastWorkout: daysAgo === 0 ? 'Today' : daysAgo === 1 ? 'Yesterday' : `${daysAgo}d ago`,
    totalSessions,
    thisWeek,
  };
}

function getBestSet(exerciseName) {
  const all = state.history.filter(e => e.exercise === exerciseName).flatMap(e => e.sets);
  if (!all.length) return null;
  // Best = highest volume set, then show weight × reps
  return all.reduce((best, s) => (s.weight * s.reps > best.weight * best.reps ? s : best));
}

// ============================================================
// ACTIONS
// ============================================================
function startSession(type) {
  if (state.activeSession?.sessionType === type) {
    saveLS('currentSession', state.activeSession);
    setState({ view: 'workout', sessionType: type });
    return;
  }
  const session = { sessionType: type, exercises: [], startedAt: new Date().toISOString() };
  saveLS('currentSession', session);
  setState({ view: 'workout', sessionType: type, activeSession: session });
}

function resumeSession() {
  setState({ view: 'workout', sessionType: state.activeSession.sessionType });
}

function abandonSession() {
  if (!confirm('Abandon session? All progress will be lost.')) return;
  removeLS('currentSession');
  setState({ view: 'select', sessionType: null, activeSession: null });
}

function completeSession() {
  const validExercises = (state.activeSession?.exercises || []).filter(e => e.sets.length > 0);
  if (!validExercises.length) return;
  const ts      = new Date().toISOString();
  const entries = validExercises.map(ex => ({ ...ex, date: ts, session: state.activeSession.sessionType }));
  const history = [...entries, ...state.history];
  saveLS('workoutHistory', history);
  removeLS('currentSession');
  syncToSheets(entries);
  setState({ view: 'select', sessionType: null, activeSession: null, history });
}

function selectExercise(idx) {
  const ex         = WORKOUTS[state.sessionType][idx];
  const history    = getExerciseHistory(ex.name);
  const lastWeight = history[0]?.sets[0]?.weight ?? ex.weight;
  // Restore any partial sets already saved for this exercise in the current session
  const savedEntry = state.activeSession?.exercises.find(e => e.exercise === ex.name);
  const sets       = savedEntry ? savedEntry.sets : [];
  const weight     = sets.length > 0 ? sets[0].weight : lastWeight;
  const repInput = sets.length > 0 ? String(sets[sets.length - 1].reps) : '';
  setState({ view: 'exercise', activeExercise: ex, sets, weight, repInput });
}

function saveExerciseToSession(sets) {
  // Upsert current exercise into active session — replaces existing entry if present
  const entry    = { exercise: state.activeExercise.name, sets };
  const existing = state.activeSession.exercises.findIndex(e => e.exercise === entry.exercise);
  const exercises = existing >= 0
    ? state.activeSession.exercises.map((e, i) => i === existing ? entry : e)
    : [...state.activeSession.exercises, entry];
  const session = { ...state.activeSession, exercises };
  saveLS('currentSession', session);
  return session;
}

function numpadKey(k) {
  if (k === '⌫') {
    state.repInput = state.repInput.slice(0, -1);
  } else {
    if (state.repInput.length >= 2) return;
    state.repInput += k;
  }
  const display = document.getElementById('repDisplay');
  const btn     = document.getElementById('btnLogSet');
  if (display) {
    display.textContent = state.repInput || '—';
    display.classList.toggle('empty', !state.repInput);
  }
  if (btn) btn.disabled = !(state.repInput && Number(state.repInput) > 0);
}

function addSet() {
  const reps = parseInt(state.repInput);
  if (!reps || reps <= 0) return;
  const newSet   = { reps, weight: state.weight, prs: detectPRs(state.activeExercise.name, { reps, weight: state.weight }, state.sets) };
  const sets     = [...state.sets, newSet];
  const repInput = sets.length < MAX_SETS ? String(reps) : '';
  // Auto-save after every set
  const session  = saveExerciseToSession(sets);
  setState({ sets, repInput, activeSession: session });
}

function removeLastSet() {
  const sets    = state.sets.slice(0, -1);
  const session = sets.length > 0 ? saveExerciseToSession(sets) : (() => {
    // Remove exercise from session if no sets left
    const exercises = state.activeSession.exercises.filter(e => e.exercise !== state.activeExercise.name);
    const s = { ...state.activeSession, exercises };
    saveLS('currentSession', s);
    return s;
  })();
  setState({ sets, activeSession: session });
}

function completeExercise() {
  const session = saveExerciseToSession(state.sets);
  setState({ view: 'workout', activeSession: session, activeExercise: null, sets: [], weight: 0, repInput: '' });
}

function deleteHistoryDay(dateStr) {
  if (!confirm(`Delete all entries for ${dateStr}?`)) return;
  const history = state.history.filter(e => new Date(e.date).toLocaleDateString() !== dateStr);
  saveLS('workoutHistory', history);
  setState({ history });
}

function saveEditDate(oldDateStr, newISODate) {
  if (!newISODate) { setState({ editingDate: null }); return; }
  const history = state.history.map(e => {
    if (new Date(e.date).toLocaleDateString() !== oldDateStr) return e;
    const old = new Date(e.date);
    const [y, m, d] = newISODate.split('-').map(Number);
    const updated = new Date(old);
    updated.setFullYear(y, m - 1, d);
    return { ...e, date: updated.toISOString() };
  });
  saveLS('workoutHistory', history);
  setState({ history, editingDate: null });
}

function clearAllHistory() {
  if (!confirm('Clear ALL workout history? This cannot be undone.')) return;
  saveLS('workoutHistory', []);
  setState({ history: [] });
}

function exportHistory() {
  const data = JSON.stringify(state.history, null, 2);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(data)
      .then(() => alert('Copied! Paste into Claude.'))
      .catch(() => alert('Copy failed — try again.'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = data; document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    alert(ok ? 'Copied! Paste into Claude.' : 'Copy failed — try again.');
  }
}

function progressBarHTML(completed, total, sessionType) {
  const pct = total > 0 ? (completed / total) * 100 : 0;
  return `
    <div class="progress-bar-wrap mb-4">
      <div class="progress-bar-labels mb-1">
        <span class="label" style="color:var(--cyan)">SESSION ${sessionType}</span>
        <span class="label">${completed}/${total}</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>`;
}

// ============================================================
// CALENDAR BUILDER
// ============================================================
function buildCalendarHTML() {
  const now    = new Date();
  const target = new Date(now.getFullYear(), now.getMonth() - state.calOffset, 1);
  const year   = target.getFullYear();
  const month  = target.getMonth();

  // Build a set of worked dates → session type
  const workedDays = {};
  state.history.forEach(e => {
    const d   = new Date(e.date);
    if (d.getFullYear() === year && d.getMonth() === month) {
      const key = d.getDate();
      if (!workedDays[key]) workedDays[key] = e.session;
    }
  });

  const monthName  = target.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDayRaw = new Date(year, month, 1).getDay(); // 0=Sun
  const startDay    = (startDayRaw + 6) % 7; // Mon=0, Tue=1 ... Sun=6
  const todayDate   = (now.getMonth() === month && now.getFullYear() === year) ? now.getDate() : -1;

  const dayLabels  = ['Mo','Tu','We','Th','Fr','Sa','Su'].map(d =>
    `<div class="cal-day-label">${d}</div>`).join('');

  // Empty cells before day 1
  const empties = Array(startDay).fill(`<div class="cal-day empty"></div>`).join('');

  // Day cells
  const days = Array.from({ length: daysInMonth }, (_, i) => {
    const day     = i + 1;
    const session = workedDays[day];
    const isToday = day === todayDate;
    const cls     = ['cal-day', session ? `worked-${session}` : '', isToday && !session ? 'today' : ''].filter(Boolean).join(' ');
    return `<div class="${cls}">${day}</div>`;
  }).join('');

  const canGoForward = state.calOffset > 0;

  return `
    <div class="card card--glow mb-4">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <button type="button" class="cal-nav" aria-label="Previous month" onclick="setState({calOffset: state.calOffset + 1})">‹</button>
        <div class="label" style="color:var(--text-mid);font-weight:700">${monthName.toUpperCase()}</div>
        <button type="button" class="cal-nav" aria-label="Next month" onclick="setState({calOffset: Math.max(0, state.calOffset - 1)})" ${!canGoForward ? 'style="opacity:0.2;pointer-events:none"' : ''}>›</button>
      </div>
      <div class="cal-grid">
        ${dayLabels}
        ${empties}
        ${days}
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;justify-content:center">
        <span style="font-size:0.6rem;color:var(--violet)">■ Session A</span>
        <span style="font-size:0.6rem;color:var(--cyan)">■ Session B</span>
        <span style="font-size:0.6rem;color:var(--blue)">■ Session C</span>
      </div>
    </div>`;
}

        <div class="stat-item">
          <div style="font-size:1.375rem;font-weight:800;color:var(--cyan);letter-spacing:-0.02em">${stats.totalSessions}</div>
          <div class="label mt-1">Total sessions</div>
        </div>
        <div class="stat-item">
          <div style="font-size:1.375rem;font-weight:800;color:var(--cyan);letter-spacing:-0.02em">${stats.thisWeek}</div>

      <div class="empty-state-title">No sessions yet</div>
      <div class="empty-state-sub">Pick a session below to get started.<br>Your stats will appear here after your first workout.</div>
    </div>`;

  const resumeHTML = (session?.exercises.length > 0) ? `
    <div class="resume-banner mb-4">
      <div style="font-weight:700;font-size:0.875rem;color:var(--blue);margin-bottom:2px">Session ${session.sessionType} in progress</div>

      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <span style="font-size:1.125rem;font-weight:800;color:var(--white)">Session ${s}</span>
          ${isNext ? '<span class="next-badge">NEXT</span>' : ''}
        </div>
        <div class="label">${WORKOUTS[s].length} exercises · ${WORKOUTS[s].length * MAX_SETS} sets</div>

    </button>`;
  }).join('');

  return `
    <div class="screen">
      <div class="container container--home">
        <div class="text-center mb-4">
          <div class="label mb-1">MATT · ${new Date().toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'short'})}</div>
          <h1 class="title-xl mb-4">Workout Tracker</h1>
          ${tabBar}
        </div>
        ${statsHTML}
        ${resumeHTML}
        <div class="space-y-2 mb-6">${sessionBtns}</div>
        ${buildCalendarHTML()}
        <div class="space-y-2">
          <button type="button" class="btn-nav" onclick="setState({view:'history'})">View History</button>

// ============================================================
// WORKOUT SCREEN
// ============================================================
function renderWorkout() {
  const type      = state.sessionType;
  const exercises = WORKOUTS[type];
  const done      = completedExercises();
  const partial   = partialExercises();

  const items = exercises.map((ex, idx) => {
    const history    = getExerciseHistory(ex.name);
    const recent     = history[0];
    const isDone     = done.includes(ex.name);
    const partialEx  = partial.find(p => p.name === ex.name);
    const isPartial  = !!partialEx && !isDone;

    let recentHTML = '';
    if (recent && !isDone) {
      const lastWeight  = recent.sets[0]?.weight;
      const lastReps    = recent.sets.map(s => s.reps).join('-');
      const prev        = history[1];
      const prevWeight  = prev?.sets[0]?.weight ?? null;
      const prevMaxReps = prev ? Math.max(...prev.sets.map(s => s.reps)) : null;
      const lastMaxReps = Math.max(...recent.sets.map(s => s.reps));

      let trendIcon = '='; let trendColor = 'var(--text-dim)';
      if (prevWeight !== null) {
        if (lastWeight > prevWeight) { trendIcon = '↑'; trendColor = 'var(--green)'; }
        else if (lastWeight < prevWeight) { trendIcon = '↓'; trendColor = 'var(--red)'; }
        else if (lastMaxReps > prevMaxReps) { trendIcon = '↑'; trendColor = 'var(--green)'; }
        else if (lastMaxReps < prevMaxReps) { trendIcon = '↓'; trendColor = 'var(--red)'; }
      }

      recentHTML = `
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
          <span class="label">Last</span>
          <span style="font-size:0.75rem;font-weight:700;color:var(--text-mid)">${lastReps} @ ${lastWeight}kg</span>
          ${prevWeight !== null ? `<span style="font-size:0.75rem;font-weight:800;color:${trendColor}">${trendIcon}</span>` : ''}
        </div>`;
    }

    // Status badge
    let statusBadge = '';
    if (isDone) {
      statusBadge = `<span class="check-circle">${icons.checkFill}</span>`;
    } else if (isPartial) {
      statusBadge = `<span style="font-size:0.65rem;font-weight:700;color:var(--cyan);background:var(--cyan-glow);border:1px solid var(--cyan-dim);border-radius:9999px;padding:2px 7px">${partialEx.sets}/${MAX_SETS}</span>`;
    }

    return `
      <button type="button" class="exercise-item ${isDone ? 'done' : isPartial ? 'partial' : ''}" onclick="selectExercise(${idx})">
        <div style="flex:1">
          <div class="flex-row mb-1" style="align-items:center;gap:8px">
            <div style="font-size:0.875rem;font-weight:700;${isDone ? 'text-decoration:line-through;color:var(--muted)' : 'color:var(--white)'}">${ex.name}</div>
            ${statusBadge}
          </div>
          <div class="label">${ex.weight > 0 ? ex.weight + 'kg' : 'BW'} · ${ex.targetReps} reps</div>
          ${recentHTML}
        </div>
        ${icons.chevron}
      </button>`;
  }).join('');

  const started    = done.length + partial.length;
  const bottomHTML = started > 0 ? `
    <div class="mt-4 space-y-2">
      <button type="button" class="btn-primary" onclick="completeSession()">
        ${icons.check} COMPLETE SESSION (${done.length}/${exercises.length})
      </button>
      <button type="button" class="btn-secondary" onclick="abandonSession()">Abandon Session</button>
    </div>` : '';

  return `
    <div class="screen">
      <div class="container">
        <button type="button" class="btn-back" onclick="goBack()">${icons.back} Back</button>
        ${progressBarHTML(done.length, exercises.length, type)}
        <div class="space-y-2">${items}</div>
        ${bottomHTML}
      </div>
    </div>`;
}

// EXERCISE SCREEN
// ============================================================
function renderExercise() {
  const ex          = state.activeExercise;
  const history     = getExerciseHistory(ex.name);
  const lastSession = history[0] || null;
  const done        = completedExercises();
  const total       = WORKOUTS[state.sessionType].length;
  const progression = state.sets.length === MAX_SETS ? getProgressionStatus(ex, state.sets) : null;

  // Last session
  const lastHTML = lastSession ? `
    <div class="card--deep mb-3">
      <div class="label mb-1">Last session</div>
      <div style="font-size:0.875rem;color:var(--text-mid);font-weight:600">${lastSession.sets.map(s => s.reps).join('-')} @ ${lastSession.sets[0]?.weight ?? '?'}kg</div>
    </div>` : '';

  // Weight modified warning
  const modifiedHTML = (lastSession && lastSession.sets.length > 0 && state.weight !== lastSession.sets[0].weight)
    ? `<div class="modified-label">↕ Modified from last session (${lastSession.sets[0].weight}kg)</div>` : '';

  // Sets list
  const setsHTML = state.sets.length === 0
    ? `<p style="text-align:center;padding:14px 0;font-size:0.75rem;color:var(--muted)">No sets logged yet</p>`
    : state.sets.map((set, idx) => `
        <div class="set-row-wrap">
          <div class="set-row">
            <span class="label">Set ${idx + 1}</span>
            <span style="font-weight:700;font-size:0.9rem">${set.weight}kg × ${set.reps}</span>
          </div>
          ${set.prs?.length > 0 ? `<div class="pr-badges">${set.prs.map(p => `<div class="pr-badge">${p.icon} ${p.message}</div>`).join('')}</div>` : ''}
        </div>`).join('');

  const removeHTML = state.sets.length > 0 ? `
    <button type="button" class="btn-danger mb-3" onclick="removeLastSet()">${icons.x} Remove last set</button>` : '';

  const progHTML = progression ? `
    <div class="progression ${progression.status}">${progression.message}</div>` : '';

  let actionHTML = '';
  if (state.sets.length < MAX_SETS) {
    const placeholder = (lastSession && lastSession.sets.length > 0 && state.sets.length === 0) ? lastSession.sets[0].reps.toString() : '0';
    const saveBackBtn = state.sets.length > 0 ? `
      <button type="button" class="btn-save-back mt-2" onclick="completeExercise()">
        ${icons.check} Save ${state.sets.length} set${state.sets.length > 1 ? 's' : ''} & back
      </button>` : '';
    actionHTML = `
      <div class="mb-3">
        <div class="label mb-2">Reps — Set ${state.sets.length + 1}</div>
        <div id="repDisplay" class="rep-display mb-3 ${!state.repInput ? 'empty' : ''}" aria-label="Reps for current set">
          ${state.repInput || placeholder}
        </div>
        <div class="numpad mb-3">
          <button type="button" class="numpad-key" onclick="numpadKey('1')">1</button>
          <button type="button" class="numpad-key" onclick="numpadKey('2')">2</button>
          <button type="button" class="numpad-key" onclick="numpadKey('3')">3</button>
          <button type="button" class="numpad-key" onclick="numpadKey('4')">4</button>
          <button type="button" class="numpad-key" onclick="numpadKey('5')">5</button>
          <button type="button" class="numpad-key" onclick="numpadKey('6')">6</button>
          <button type="button" class="numpad-key" onclick="numpadKey('7')">7</button>
          <button type="button" class="numpad-key" onclick="numpadKey('8')">8</button>
          <button type="button" class="numpad-key" onclick="numpadKey('9')">9</button>
          <button type="button" class="numpad-key backspace" onclick="numpadKey('⌫')">⌫</button>
          <button type="button" class="numpad-key zero" onclick="numpadKey('0')">0</button>
        </div>
        <button type="button" id="btnLogSet" class="btn-log" onclick="addSet()" ${!state.repInput || Number(state.repInput) <= 0 ? 'disabled' : ''}>
          ${icons.plus} LOG SET ${state.sets.length + 1}
        </button>
        ${saveBackBtn}
      </div>`;
  } else {
    actionHTML = `
      <button type="button" class="btn-complete-ex" onclick="completeExercise()">
        ${icons.check24} COMPLETE EXERCISE
      </button>`;
  }

  const notesHTML = ex.notes ? `<div class="note-box mb-3">💡 ${ex.notes}</div>` : '';

  const historyHTML = history.length > 1 ? `
    <div class="section-label"><span>Previous sessions</span></div>
    <div class="space-y-2">
      ${history.slice(1).map(entry => `
        <div class="card--inner">
          <div class="label mb-1">${new Date(entry.date).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</div>
          <div style="font-size:0.8rem;color:var(--text-mid);font-weight:600">${entry.sets.map(s => s.reps).join('-')} @ ${entry.sets[0]?.weight ?? '?'}kg</div>
        </div>`).join('')}
    </div>` : '';

  return `
    <div class="screen">
      <div class="container">
        <button type="button" class="btn-back" onclick="goBack()">${icons.back} Back</button>
        ${progressBarHTML(done.length, total, state.sessionType)}

        <div class="card card--glow mb-3">
          <div class="ex-header">
            <div class="ex-accent-bar session-${state.sessionType}"></div>
            <div style="flex:1">
              <div class="label mb-1">Session ${state.sessionType}</div>
              <h2 class="title-lg mb-3">${ex.name}</h2>
              ${lastHTML}

          <div class="mb-3">
            <div class="label mb-2">Weight (kg)</div>
            <input type="number" inputmode="decimal" value="${state.weight}" class="input-weight" aria-label="Weight in kilograms"
                   oninput="setState({weight:Math.max(0,parseFloat(this.value)||0)})" />
            ${modifiedHTML}
          </div>

          <div class="grid-2 mb-2">
            <div class="card--deep"><span class="label">Target </span><span style="font-weight:600">${ex.targetReps} reps</span></div>
            <div class="card--deep"><span class="label">Rest </span><span style="font-weight:600">${ex.rest}</span></div>
          </div>
          ${notesHTML}
            </div>
          </div>
        </div>

        <div class="card card--glow mb-3">
          <div class="title-sm mb-3">Sets ${state.sets.length}/${MAX_SETS}</div>
          ${state.sets.length > 0 ? `<div class="space-y-2 mb-3">${setsHTML}</div>` : setsHTML}
          ${removeHTML}
          ${progHTML}
          ${actionHTML}
        </div>

        ${historyHTML}
      </div>
    </div>`;
}

// ============================================================
// HISTORY SCREEN
// ============================================================
function renderHistory() {
  // Build exercise list from history for dropdown
  const allExercises = [...new Set(state.history.map(e => e.exercise))].sort();
  const filter = state.historyFilter;

  const dropdown = `
    <div class="mb-4">
      <select aria-label="Filter history by exercise" onchange="setState({historyFilter:this.value})">
        <option value="" ${!filter ? 'selected' : ''}>All exercises</option>
        ${allExercises.map(ex => `<option value="${ex}" ${filter === ex ? 'selected' : ''}>${ex}</option>`).join('')}
      </select>
    </div>`;

  // Filter and group
  const filtered = filter ? state.history.filter(e => e.exercise === filter) : state.history;
  const grouped  = filtered.reduce((acc, entry) => {
    const date = new Date(entry.date).toLocaleDateString();
    (acc[date] ??= []).push(entry);
    return acc;
  }, {});

  const bodyHTML = Object.keys(grouped).length === 0
    ? `<div class="card text-center" style="padding:32px"><p style="color:var(--muted);font-size:0.875rem">${filter ? 'No entries for this exercise' : 'No history yet'}</p></div>`
    : `<div class="space-y-3">${Object.entries(grouped).map(([date, entries]) => {
        const d = new Date(entries[0].date);
        const isoVal = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        const isEditing = state.editingDate === date;
        const dateHeader = isEditing
          ? `<input type="date" class="date-edit-input" value="${isoVal}"
               aria-label="Edit entry date"
               onchange="saveEditDate('${date}', this.value)"
               onblur="setState({editingDate:null})"
               autofocus />`
          : `${icons.cal} ${date}<span class="chip" style="margin-left:4px">${entries[0].session}</span>`;
        return `
        <div class="card card--glow">
          <div class="flex mb-3" style="justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:6px;color:var(--text-mid);font-size:0.75rem;font-weight:600">
              ${dateHeader}
            </div>
            <div style="display:flex;align-items:center;gap:2px">
              ${isEditing ? '' : `<button type="button" class="btn-edit-day" onclick="setState({editingDate:'${date}'})" title="Edit date" aria-label="Edit date">${icons.pencil}</button>`}
              <button type="button" class="btn-delete-day" onclick="deleteHistoryDay('${date}')" title="Delete date" aria-label="Delete date">${icons.x14}</button>
            </div>
          </div>
          <div class="space-y-2">
            ${entries.map(entry => `
              <div class="card--inner">
                <div style="font-weight:700;font-size:0.8rem;margin-bottom:2px;color:var(--white)">${entry.exercise}</div>
                <div style="font-size:0.75rem;color:var(--text-mid)">${entry.sets.map(s => `${s.reps}@${s.weight}kg`).join(' \xb7 ')}</div>
              </div>`).join('')}
          </div>
        </div>`;
      }).join('')}</div>`;

  return `
    <div class="screen">
      <div class="container">
        <button type="button" class="btn-back" onclick="goBack()">${icons.back} Back</button>
        <div class="flex mb-4" style="justify-content:space-between;align-items:center">
          <h2 class="title-xl">History</h2>
          ${state.history.length > 0 ? `<button type="button" class="btn-clear-all" onclick="clearAllHistory()">CLEAR ALL</button>` : ''}
        </div>
        ${dropdown}
        ${bodyHTML}
      </div>
    </div>`;
}

// ============================================================
// SETTINGS SCREEN
// ============================================================
function renderSettings() {
  return `
    <div class="screen">
      <div class="container">
        <button type="button" class="btn-back" onclick="goBack()">${icons.back} Back</button>
        <h2 class="title-xl mb-4">Settings</h2>

        <div class="card card--glow mb-3">
          <div class="title-sm mb-2">Google Sheets Sync</div>
          <div style="font-size:0.75rem;color:var(--text-mid);line-height:1.6">
            ${SHEETS_URL ? '✅ Connected — sessions sync automatically.' : '⚠️ Not configured.'}
          </div>

        <div class="card card--glow">

          <div style="font-size:0.75rem;color:var(--text-dim);margin-bottom:12px;line-height:1.5">
            Copy full workout history to clipboard and paste into your Claude chat.

// ============================================================
// PROGRESS SCREEN
// ============================================================
function renderProgressContent() {
  const allEx = ['A','B','C'].flatMap(s => WORKOUTS[s].map(e => ({ name: e.name, session: s })));
  const withData = allEx.filter(e => state.history.some(h => h.exercise === e.name));

  const selectedEx = (state.progressEx && withData.some(e => e.name === state.progressEx))
    ? state.progressEx
    : (withData[0]?.name ?? null);
  const mode       = state.progressMode;

  const dropdown = withData.length > 0 ? `
    <div class="mb-4">
      <label class="label" for="progressExerciseSelect">Exercise</label>
      <select id="progressExerciseSelect" class="graph-toggle-btn" aria-label="Select exercise" onchange="setState({progressEx:this.value})">
        ${withData.map(e => `<option value="${e.name}" ${e.name === selectedEx ? 'selected' : ''}>${e.name}</option>`).join('')}
      </select>
    </div>` : '';

  let graphHTML = '<div class="graph-empty">No data yet</div>';
  let statsHTML = '';

  if (selectedEx) {
    const points = getProgressData(selectedEx, mode);
    if (points.length < 2) {
      graphHTML = '<div class="graph-empty">Need at least 2 sessions to show graph</div>';
    } else {
      graphHTML = `<div class="graph-wrap">${buildGraphSVG(points, mode)}</div>`;
      const vals   = points.map(p => p.val);
      const latest = vals[vals.length - 1];
      const peak   = Math.max(...vals);
      const gain   = +(latest - vals[0]).toFixed(1);
      const gainStr = gain > 0 ? `+${gain}` : `${gain}`;
      const unit   = mode === 'volume' ? 'kg' : mode === '1rm' ? '' : 'kg';
      const fmt    = v => mode === 'volume' ? Math.round(v) : v;
      statsHTML = `
        <div class="graph-stat-row">
          <div class="graph-stat">
            <div class="graph-stat-val">${fmt(latest)}${unit}</div>
            <div class="graph-stat-lbl">Current</div>
          </div>
          <div class="graph-stat">
            <div class="graph-stat-val">${fmt(peak)}${unit}</div>
            <div class="graph-stat-lbl">Peak</div>
          </div>
          <div class="graph-stat" style="border-color:${gain >= 0 ? 'var(--green-dim)' : 'var(--red-dim)'}">
            <div class="graph-stat-val" style="color:${gain >= 0 ? 'var(--green)' : 'var(--red)'}">${gain >= 0 ? '+' : ''}${fmt(gain)}${unit}</div>
            <div class="graph-stat-lbl">Progress</div>
          </div>
        </div>`;
    }
  }

  return `
    ${dropdown}
    <div class="card card--glow">
      <div class="graph-toggle">
        <button type="button" class="graph-toggle-btn ${mode === 'weight' ? 'active' : ''}"
          onclick="setState({progressMode:'weight'})">Weight</button>
        <button type="button" class="graph-toggle-btn ${mode === '1rm' ? 'active' : ''}"
          onclick="setState({progressMode:'1rm'})">Est. 1RM</button>
        <button type="button" class="graph-toggle-btn ${mode === 'volume' ? 'active' : ''}"
          onclick="setState({progressMode:'volume'})">Volume</button>
      </div>
      ${graphHTML}
      ${statsHTML}
    </div>`;
}

function renderProgress() {
  return `
    <div class="screen">
      <div class="container">
        <button type="button" class="btn-back" onclick="goBack()">${icons.back} Back</button>
        <h2 class="title-xl mb-4">Progress</h2>
        ${renderProgressContent()}
      </div>
    </div>`;
}

function getProgressData(exName, mode) {
  const entries = state.history
    .filter(e => e.exercise === exName)
    .map(e => {
      const best = e.sets.reduce((b, s) => s.weight * (1 + s.reps / 30) > b.weight * (1 + b.reps / 30) ? s : b, e.sets[0]);
      let val;
      if (mode === '1rm') {
        val = Math.round(best.weight * (1 + best.reps / 30) * 10) / 10;
      } else if (mode === 'volume') {
        val = e.sets.reduce((sum, s) => sum + s.weight * s.reps, 0);
      } else {
        val = best.weight;
      }
      return { date: e.date.slice(0, 10), val };
    })
    .reverse();

  // Deduplicate — keep best per date
  const seen = {};
  for (const p of entries) {
    if (!seen[p.date] || p.val > seen[p.date]) seen[p.date] = p.val;
  }
  return Object.entries(seen).sort().map(([date, val]) => ({ date, val }));
}

function buildGraphSVG(points, mode) {
  if (points.length < 2) return null;

  const W = 320, H = 160, padL = 36, padR = 8, padT = 12, padB = 28;
  const vals  = points.map(p => p.val);
  const minV  = Math.min(...vals);
  const maxV  = Math.max(...vals);
  const range = maxV - minV || 1;

  const xScale = i => padL + (i / (points.length - 1)) * (W - padL - padR);
  const yScale = v => padT + (1 - (v - minV) / range) * (H - padT - padB);

  // Line path
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(i).toFixed(1)},${yScale(p.val).toFixed(1)}`).join(' ');

  // Area fill path
  const areaPath = `${linePath} L${xScale(points.length-1).toFixed(1)},${(H-padB).toFixed(1)} L${padL},${(H-padB).toFixed(1)} Z`;

  // Y axis labels (3 ticks)
  const yTicks = [minV, (minV + maxV) / 2, maxV].map((v) => {
    const y     = yScale(v);
    const label = mode === 'volume' ? Math.round(v).toString() : v.toFixed(mode === '1rm' ? 1 : 0);
    return `<text x="${padL - 4}" y="${y + 4}" text-anchor="end" fill="var(--text-dim)" font-size="9">${label}</text>`;
  });

  // X axis labels — show first, middle, last dates
  const xIdxs = [0, Math.floor((points.length - 1) / 2), points.length - 1];
  const xTicks = xIdxs.map(i => {
    const d = new Date(points[i].date);
    const label = d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
    return `<text x="${xScale(i).toFixed(1)}" y="${H - padB + 14}" text-anchor="middle" fill="var(--text-dim)" font-size="9">${label}</text>`;
  });

  // Dots on each point
  const dots = points.map((p, i) =>
    `<circle cx="${xScale(i).toFixed(1)}" cy="${yScale(p.val).toFixed(1)}" r="3" fill="var(--cyan)" />`
  ).join('');

  return `
    <svg class="graph-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--cyan)" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="var(--cyan)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#gfill)" />
      <path d="${linePath}" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
      ${yTicks.join('')}
      ${xTicks.join('')}
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB}" stroke="var(--border)" stroke-width="1"/>
      <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}" stroke="var(--border)" stroke-width="1"/>
    </svg>`;
}

// ============================================================
(function initSwipe() {
  let startX = 0;
  let startY = 0;
  let startTime = 0;

  document.addEventListener('touchstart', e => {
    startX    = e.touches[0].clientX;
    startY    = e.touches[0].clientY;
    startTime = Date.now();
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (state.view === 'select') return;
    const dx         = e.changedTouches[0].clientX - startX;
    const dy         = e.changedTouches[0].clientY - startY;
    const elapsed    = Date.now() - startTime;
    const isHoriz    = Math.abs(dx) > Math.abs(dy) * 1.5;
    const isFast     = elapsed < 350;
    const isRight    = dx > 60;
    const nearEdge   = startX < 40;

    if (isHoriz && isFast && isRight && nearEdge) goBack();
  }, { passive: true });
})();

document.addEventListener('keydown', e => {
  if (state.view === 'exercise' && state.sets.length < MAX_SETS) {
    if (e.key >= '0' && e.key <= '9') { numpadKey(e.key); return; }
    if (e.key === 'Backspace') { e.preventDefault(); numpadKey('⌫'); return; }
    if (e.key === 'Enter') { addSet(); return; }
  }
  if (e.key === 'Escape' && state.view !== 'select') {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    goBack();
  }
});

// ============================================================
// RENDER DISPATCHER
// ============================================================
function render() {
  const app = document.getElementById('app');
  switch (state.view) {
    case 'select':   app.innerHTML = renderSelect();   break;
    case 'workout':  app.innerHTML = renderWorkout();  break;
    case 'exercise': app.innerHTML = renderExercise(); break;
    case 'history':  app.innerHTML = renderHistory();  break;
    case 'settings': app.innerHTML = renderSettings(); break;
    case 'progress': app.innerHTML = renderProgress(); break;
  }
  // Apply slide-back animation class
  if (_goingBack) {
    const screen = app.querySelector('.screen');
    if (screen) screen.classList.add('back');
  }
  if (state.view === 'exercise' && state.sets.length < MAX_SETS) {
    const input = document.getElementById('repInput');
    if (input) input.focus();
  }
}

// ============================================================
// BOOT
// ============================================================
initState();
render();
</script>
